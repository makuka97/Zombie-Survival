          case 'ar': {
            this._emitParticle(x, y, Math.cos(angle)*8, Math.sin(angle)*8, '#ffffff', 5, 6);
            for (let i = 0; i < 6; i++) {
              const a = angle + (Math.random()-0.5)*0.4;
              const s = 4 + Math.random()*5;
              this._emitParticle(x, y, Math.cos(a)*s, Math.sin(a)*s, i < 2?'#ffffff':'#ffcc00', 8, 2+Math.random()*2);
            }
            break;
          }
          case 'lmg': {
            this._emitParticle(x, y, Math.cos(angle)*7, Math.sin(angle)*7, '#ffffff', 5, 8);
            this._emitParticle(x, y, Math.cos(angle)*4, Math.sin(angle)*4, '#ff8800', 7, 6);
            for (let i = 0; i < 8; i++) {
              const a = angle + (Math.random()-0.5)*0.35;
              const s = 5 + Math.random()*5;
              this._emitParticle(x, y, Math.cos(a)*s, Math.sin(a)*s, i%3===0?'#ffffff':i%3===1?'#ffaa00':'#ffee00', 7, 2+Math.random()*3);
            }
            break;
          }
          case 'raygun': {
            for (let i = 0; i < 16; i++) {
              const a = angle + (Math.random()-0.5)*(i < 8 ? 0.3 : 1.2);
              const s = 3 + Math.random()*9;
              const colors = ['#00eeff','#00aaff','#aaf0ff','#ffffff','#0066ff'];
              this._emitParticle(x, y, Math.cos(a)*s, Math.sin(a)*s, colors[Math.floor(Math.random()*colors.length)], 8+Math.random()*8|0, 1+Math.random()*3);
            }
            this._emitParticle(x, y, Math.cos(angle)*10, Math.sin(angle)*10, '#ffffff', 4, 5);
            this._emitParticle(x, y, 0, 0, '#00eeff', 6, 8);
            break;
          }
          case 'thundergun': {
            this._emitParticle(x, y, 0, 0, '#ffffff', 8, 18);
            this._emitParticle(x, y, 0, 0, '#ff2200', 10, 14);
            for (let i = 0; i < 20; i++) {
              const a = (i / 20) * Math.PI * 2;
              const s = 4 + Math.random()*5;
              this._emitParticle(x, y, Math.cos(a)*s, Math.sin(a)*s, i%3===0?'#ffffff':'#ff2200', 20, 3+Math.random()*4);
            }
            break;
          }
        }
      }

      performMelee(p) {
        this.meleeFlashes.push({ x: p.x, y: p.y, angle: p.angle, timer: 8, color: p.color });

        for (let j = this.zombies.length - 1; j >= 0; j--) {
          const z  = this.zombies[j];
          const dx = z.x - p.x, dy = z.y - p.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist > MELEE_RANGE + (z.hitRadius??z.size/2)) continue;

          const angleToZombie = Math.atan2(dy, dx);
          let angleDiff = angleToZombie - p.angle;
          while (angleDiff >  Math.PI) angleDiff -= Math.PI * 2;
          while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
          if (Math.abs(angleDiff) > MELEE_ARC / 2) continue;

          z.hp -= MELEE_DAMAGE;

          if (z.hp <= 0) {
            p.points += z.points;
            
            this.ammoPacks.push({ x: z.x, y: z.y });
            if (Math.random() < 0.08) this.healthPacks.push({ x: z.x, y: z.y });
            this.triggerExplosion(z.x, z.y, z.borderColor);
            if (z.type === 'bomber') this.triggerBomberExplosion(z.x, z.y);
            this.zombies.splice(j, 1);
            if (!z.spiralAdd) { // spiral adds don't count toward wave total
              this.waveKilled++;
              if (this.waveKilled >= this.waveTotal && this.zombies.filter(z=>!z.spiralAdd).length === 0) {
                this._advanceWave(3000);
              }
            }
          }
        }

        if (this.boss && !this.boss.dead && !this.boss.dropping) {
          const pts = this.getBossHitPoints();
          for (let t = 0; t < pts.length; t++) {
            const pt = pts[t];
            const dx = pt.x - p.x, dy = pt.y - p.y;
            const dist = Math.sqrt(dx*dx+dy*dy);
            if (dist > MELEE_RANGE + 20) continue;
            const angleToTip = Math.atan2(dy, dx);
            let angleDiff = angleToTip - p.angle;
            while (angleDiff >  Math.PI) angleDiff -= Math.PI * 2;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            if (Math.abs(angleDiff) > MELEE_ARC / 2) continue;
            this._damageBossHitPoint(pt, MELEE_DAMAGE);
          }
        }
      }

      aabb(ax, ay, as, bx, by, bs) {
        return ax < bx+bs && ax+as > bx && ay < by+bs && ay+as > by;
      }

      // ── Particle pool helpers ───────────────────────────────────
      // Returns a dormant slot from the pool and marks it active by setting
      // its life, or returns null when all slots are in use (effect is silently skipped).
      _acquireParticle() {
        for (let i = 0; i < this.PARTICLE_POOL_SIZE; i++) {
          if (this.particles[i].life <= 0) return this.particles[i];
        }
        return null; // pool full — skip this particle
      }

      _emitParticle(x, y, vx, vy, color, life, size) {
        const pt = this._acquireParticle();
        if (!pt) return;
        pt.x=x; pt.y=y; pt.vx=vx; pt.vy=vy;
        pt.color=color; pt.life=life; pt.maxLife=life; pt.size=size;
      }

      spawnParticles(x, y, color, count = 12) {
        for (let i = 0; i < count; i++) {
          const angle  = Math.random() * Math.PI * 2;
          const speed  = 1.5 + Math.random() * 4;
          const life   = 20 + Math.floor(Math.random() * 20);
          this._emitParticle(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed, color, life, 2 + Math.random() * 4);
        }
      }

      triggerExplosion(x, y, color) {
        this.spawnParticles(x, y, color);
        if (this.socket && this.roomCode) {
          this.socket.emit('explosion', { roomCode: this.roomCode, x, y, color });
        }
      }

      triggerBomberExplosion(bx, by, depth=0) {
        if (depth > BOMBER_CHAIN_DEPTH) return;
        for (let i = 0; i < 20; i++) {
          const a = (i / 20) * Math.PI * 2;
          const speed = 2 + Math.random() * 4;
          this._emitParticle(bx, by, Math.cos(a)*speed, Math.sin(a)*speed, i%2===0?'#4499ff':'#ffffff', 30+Math.random()*20, 5+Math.random()*5);
        }
        for (let p of this.players) {
          if (!p.alive || !p.connected) continue;
          const dx = p.x-bx, dy = p.y-by;
          if (Math.sqrt(dx*dx+dy*dy) < BOMBER_BLAST_RADIUS + this.PLAYER_SIZE/2) {
            p.hp -= BOMBER_PLAYER_DAMAGE;
            if (p.hp<=0&&p.alive){p.alive=false;p.hp=0;this.checkGameOver();}
          }
        }
        const toKill = [];
        for (let i = this.zombies.length-1; i >= 0; i--) {
          const z = this.zombies[i];
          const dx=z.x-bx, dy=z.y-by;
          if (Math.sqrt(dx*dx+dy*dy) < BOMBER_BLAST_RADIUS+z.size/2) toKill.push({idx:i,z});
        }
        const chainPositions = toKill.filter(({z})=>z.type==='bomber').map(({z})=>({x:z.x,y:z.y}));
        for (const {idx,z} of toKill) {
          this.triggerExplosion(z.x, z.y, z.borderColor);
          this.zombies.splice(idx,1);
          this.waveKilled++;
          if (this.waveKilled>=this.waveTotal&&this.zombies.length===0){this._advanceWave(3000);}
        }
        for (const pos of chainPositions) this.triggerBomberExplosion(pos.x,pos.y,depth+1);
      }

      updateRevive() {
        const now = Date.now();
        for (let reviver of this.players) {
          if (!reviver.alive || !reviver.connected) { this.reviveMap.delete(reviver.slot); continue; }
          let found = false;
          for (let target of this.players) {
            if (target.alive || !target.connected || target === reviver) continue;
            const dx = target.x-reviver.x, dy = target.y-reviver.y;
            if (Math.sqrt(dx*dx+dy*dy) <= this.REVIVE_RADIUS) {
              found = true;
              const attempt = this.reviveMap.get(reviver.slot);
              if (!attempt || attempt.targetSlot !== target.slot) {
                this.reviveMap.set(reviver.slot, { targetSlot: target.slot, startTime: now });
              } else if (now - attempt.startTime >= this.REVIVE_TIME) {
                target.alive = true; target.hp = 50;
                target.vx = 0; target.vy = 0; target.firing = false; target.meleeing = false;
                this.reviveMap.delete(reviver.slot);
              }
              break;
            }
          }
          if (!found) this.reviveMap.delete(reviver.slot);
        }
      }

      restart() {
        this.zombies=[]; this.bullets=[]; this.ammoPacks=[]; this.healthPacks=[];
        this.wave=1; this.waveTotal=0; this.waveKilled=0;
        for (const t of this._spawnTimeouts) clearTimeout(t);
        this._spawnTimeouts = [];
        this.gameOver=false; this.gameStarted=false;
        this.reviveMap.clear(); this.mysteryBox=null; this.waveAdvancing=false;
        this.vendingMachine=null; this.vendingCost=VENDING_BASE_COST;
        this.meleeFlashes=[]; this.boss=null; this.isBossWave=false;
        // Reset pool: mark all slots inactive without reallocating
        for (let i = 0; i < this.PARTICLE_POOL_SIZE; i++) this.particles[i].life = 0;
        for (let p of this.players) { p.savedAmmo=undefined; }

        for (let p of this.players) {
          p.x=PLAYER_SPAWNS[p.slot-1].x; p.y=PLAYER_SPAWNS[p.slot-1].y;
          p.vx=0; p.vy=0; p.angle=0;
          p.hp=100; p.maxHp=100; p.ammo=30; p.points=0;
          p.currentWeapon='pistol'; p.alive=true;
          p.firing=false; p.fireCooldown=0;
          p.grabbed=false; p.invincible=false; p.thrownVx=0; p.thrownVy=0; p.throwTimer=0; p.throwHasHit=false;
          p.meleeing=false; p.meleeCooldown=0;
          
        }
        document.getElementById('game-over-screen').style.display  = 'none';
        document.getElementById('game-info').style.display         = 'none';
        document.getElementById('lobby-screen').style.display      = 'block';
        document.getElementById('countdown').style.display         = 'none';
        document.getElementById('vote-display').textContent        = 'Waiting for restart votes...';

        for (let i = 1; i <= 4; i++) {
          const slot   = document.getElementById(`slot-${i}`);
          const status = slot.querySelector('.slot-status');
          const player = this.players[i-1];
          if (player.connected) {
            slot.className='lobby-slot connected'; status.className='slot-status status-joined'; status.textContent='JOINED';
          } else {
            slot.className='lobby-slot'; status.className='slot-status status-waiting'; status.textContent='EMPTY';
          }
        }
      }

      update() {
        if (this.gameOver || !this.gameStarted) return;
        const W = this.canvas.width, H = this.canvas.height;
        const hs = this.PLAYER_SIZE / 2;

        for (let i = this.meleeFlashes.length-1; i >= 0; i--) {
          this.meleeFlashes[i].timer--;
          if (this.meleeFlashes[i].timer <= 0) this.meleeFlashes.splice(i,1);
        }

        for (let p of this.players) {
          if (!p.connected || !p.alive) continue;
          if (p.grabbed || p.thrownVx) continue; // octopus controls this player
          const WALL = 6;
          const clamp = hs + WALL;
          p.x = Math.max(clamp, Math.min(W-clamp, p.x+p.vx));
          p.y = Math.max(clamp, Math.min(H-clamp, p.y+p.vy));

          const weapon = WEAPONS[p.currentWeapon];
          p.fireCooldown--; p.meleeCooldown--;

          if (p.firing && (p.ammo>0||p.ammo===Infinity) && p.fireCooldown<=0) {
            this.fireBullet(p); p.fireCooldown=weapon.fireRate;
          }
          if (p.meleeing && p.ammo===0 && p.ammo!==Infinity && p.meleeCooldown<=0) {
            this.performMelee(p); p.meleeCooldown=1;
          }
        }

        for (let i = this.bullets.length-1; i >= 0; i--) {
          const b = this.bullets[i];
          b.x+=b.vx; b.y+=b.vy;
          if (b.life!==undefined){b.life--;if(b.life<=0){this.bullets.splice(i,1);continue;}}
          if (b.x<0||b.x>W||b.y<0||b.y>H){this.bullets.splice(i,1);continue;}
          let hit = false;
          for (let j = this.zombies.length-1; j >= 0; j--) {
            const z = this.zombies[j];
            const bdx=b.x-z.x, bdy=b.y-z.y;
            if (Math.sqrt(bdx*bdx+bdy*bdy) < (z.hitRadius??z.size/2)+this.BULLET_SIZE/2) {
              z.hp-=b.damage; hit=true;
              if (z.hp<=0){
                let nearest=null,nearestDist=Infinity;
                for (let p of this.players){if(!p.alive||!p.connected)continue;const dx=p.x-z.x,dy=p.y-z.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<nearestDist){nearestDist=dist;nearest=p;}}
                const killer = b.owner || nearest;
                if(killer){ killer.points+=z.points;  }
                if(Math.random()<this.AMMO_DROP_CHANCE)this.ammoPacks.push({x:z.x,y:z.y});
                if(Math.random()<0.08)this.healthPacks.push({x:z.x,y:z.y});
                this.triggerExplosion(z.x,z.y,z.borderColor);
                if(z.type==='bomber')this.triggerBomberExplosion(z.x,z.y);
                const wasSpiralAdd = z.spiralAdd;
                this.zombies.splice(j,1);
                if (!wasSpiralAdd) {
                  this.waveKilled++;
                  if(this.waveKilled>=this.waveTotal&&this.zombies.filter(z=>!z.spiralAdd).length===0){this._advanceWave(3000);}
                }
              }
              break;
            }
          }
          if(hit){this.bullets.splice(i,1);continue;}

          if (this.boss&&!this.boss.dead&&!this.boss.dropping) {
            const pts=this.getBossHitPoints();
            for (let t=0;t<pts.length;t++){
              const pt=pts[t],dx=b.x-pt.x,dy=b.y-pt.y;
              const hitR=pt.piece?Math.min(pt.radius*0.6,30):22;
              if(Math.sqrt(dx*dx+dy*dy)<hitR){
                hit=true; this._damageBossHitPoint(pt, b.damage);
                this.bullets.splice(i,1); break;
              }
            }
          }
          if(hit)this.bullets.splice(i,1);
        }

        for (let z of this.zombies) {
          let nearest=null,nearestDist=Infinity;
          for (let p of this.players){if(!p.alive||!p.connected)continue;const dx=p.x-z.x,dy=p.y-z.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<nearestDist){nearestDist=dist;nearest=p;}}
          if(!nearest)continue;
          const dx=nearest.x-z.x,dy=nearest.y-z.y,dist=Math.sqrt(dx*dx+dy*dy);
          const zr=z.hitRadius??z.size/2,pr=this.PLAYER_SIZE/2,minDist=zr+pr;
          if(dist>minDist&&dist>0){z.x+=(dx/dist)*z.speed;z.y+=(dy/dist)*z.speed;}
          else if(dist<minDist&&dist>0){z.x=nearest.x-(dx/dist)*minDist;z.y=nearest.y-(dy/dist)*minDist;}
          const zpDx=nearest.x-z.x,zpDy=nearest.y-z.y;
          if(Math.sqrt(zpDx*zpDx+zpDy*zpDy)<minDist&&!nearest.invincible){nearest.hp-=0.5;if(nearest.hp<=0&&nearest.alive){nearest.alive=false;nearest.hp=0;this.checkGameOver();}}
        }

        for (let i=this.ammoPacks.length-1;i>=0;i--){
          const a=this.ammoPacks[i],hs2=this.PLAYER_SIZE/2;
          for (let p of this.players){if(!p.alive)continue;if(this.aabb(a.x-this.AMMO_SIZE/2,a.y-this.AMMO_SIZE/2,this.AMMO_SIZE,p.x-hs2,p.y-hs2,this.PLAYER_SIZE)){const weapon=WEAPONS[p.currentWeapon];p.ammo+=Math.floor(weapon.ammoCapacity*0.5);this.ammoPacks.splice(i,1);break;}}
        }
        // Cap pack arrays — oldest packs beyond the limit are silently dropped
        if (this.ammoPacks.length  > 30) this.ammoPacks.splice(0,  this.ammoPacks.length  - 30);
        if (this.healthPacks.length > 20) this.healthPacks.splice(0, this.healthPacks.length - 20);

        for (let i = 0; i < this.PARTICLE_POOL_SIZE; i++) {
          const pt = this.particles[i];
          if (pt.life <= 0) continue;
          pt.x+=pt.vx; pt.y+=pt.vy; pt.vx*=0.92; pt.vy*=0.92; pt.life--;
        }

        for (let i=this.healthPacks.length-1;i>=0;i--){
          const h=this.healthPacks[i];
          for (let p of this.players){if(!p.alive)continue;const hs2=this.PLAYER_SIZE/2;if(this.aabb(h.x-10,h.y-10,20,p.x-hs2,p.y-hs2,this.PLAYER_SIZE)){p.hp=Math.min(p.maxHp,p.hp+30);this.healthPacks.splice(i,1);break;}}
        }

        this.updateRevive();
        this.updateBoss();
        this._updatePhase2Portal();
      }

      checkGameOver() {
        const anyAlive = this.players.some(p => p.alive && p.connected);
        if (!anyAlive) {
          this.gameOver = true;
          document.getElementById('game-over-screen').style.display = 'block';
        }
      }

      render() {
        const ctx = this.ctx;
        const W = this.canvas.width, H = this.canvas.height;
        const hs = this.PLAYER_SIZE / 2;

        ctx.drawImage(this._gridCanvas, 0, 0);

        this._renderPhase2Portal();

        if (this.mysteryBox) {
          const bhs = this.BOX_SIZE / 2;
          const bx = this.mysteryBox.x, by = this.mysteryBox.y;
          // Dithered purple fill
          ctx.fillStyle = '#3d0c69';
          ctx.fillRect(bx-bhs, by-bhs, this.BOX_SIZE, this.BOX_SIZE);
          ctx.fillStyle = '#6a1a9a';
          for (let px=bx-bhs; px<bx+bhs; px+=4) for (let py=by-bhs; py<by+bhs; py+=4) ctx.fillRect(px,py,2,2);
          ctx.strokeStyle = '#d14da0'; ctx.lineWidth = 2;
          ctx.strokeRect(bx-bhs+1, by-bhs+1, this.BOX_SIZE-2, this.BOX_SIZE-2);
          ctx.fillStyle = '#ffffff'; ctx.font = 'bold 22px "Press Start 2P", monospace';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('?', bx, by);
        }

        // ── Vending machine ────────────────────────────────────────
        if (this.vendingMachine) {
          const v = this.vendingMachine;
          // C64 dark green body, pixel border
          ctx.fillStyle = '#003300';
          ctx.fillRect(v.x-28, v.y-36, 56, 72);
          ctx.fillStyle = '#004400';
          for (let px=v.x-28; px<v.x+28; px+=4) for (let py=v.y-36; py<v.y+36; py+=4) ctx.fillRect(px,py,2,2);
          ctx.strokeStyle = '#55a049'; ctx.lineWidth = 2;
          ctx.strokeRect(v.x-27, v.y-35, 54, 70);
          // health cross — pixel blocks
          ctx.fillStyle = '#55a049';
          ctx.fillRect(v.x-3, v.y-18, 6, 18);
          ctx.fillRect(v.x-10, v.y-10, 20, 6);
          // price
          ctx.fillStyle = '#94e089'; ctx.font = '6px "Press Start 2P", monospace';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('$'+this.vendingCost, v.x, v.y+18);
          ctx.fillStyle = '#55a049';
          ctx.fillText('+HP', v.x, v.y+28);
        }

        for (let a of this.ammoPacks) {
          ctx.fillStyle='#bfce72'; ctx.fillRect(a.x-this.AMMO_SIZE/2,a.y-this.AMMO_SIZE/2,this.AMMO_SIZE,this.AMMO_SIZE);
          ctx.strokeStyle='#574200'; ctx.lineWidth=2; ctx.strokeRect(a.x-this.AMMO_SIZE/2+1,a.y-this.AMMO_SIZE/2+1,this.AMMO_SIZE-2,this.AMMO_SIZE-2);
          ctx.fillStyle='#000'; ctx.font='bold 8px "Press Start 2P", monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('A',a.x,a.y);
        }

        for (let h of this.healthPacks) {
          ctx.fillStyle='#883232'; ctx.fillRect(h.x-10,h.y-10,20,20);
          ctx.strokeStyle='#b86962'; ctx.lineWidth=2; ctx.strokeRect(h.x-9,h.y-9,18,18);
          ctx.fillStyle='#ffffff'; ctx.fillRect(h.x-6,h.y-2,12,4); ctx.fillRect(h.x-2,h.y-6,4,12);
        }

        for (let z of this.zombies) {
          const zhs=z.size/2,zx=z.x-zhs,zy=z.y-zhs;
          if (z.type==='bomber') {
            // C64 bomber: blue square with X pattern
            ctx.fillStyle='#40318d'; ctx.fillRect(zx,zy,z.size,z.size);
            ctx.fillStyle='#7869c4';
            for (let px=zx; px<zx+z.size; px+=4) for (let py=zy; py<zy+z.size; py+=4) ctx.fillRect(px,py,2,2);
            ctx.strokeStyle='#6fcfcf'; ctx.lineWidth=2; ctx.strokeRect(zx+1,zy+1,z.size-2,z.size-2);
            ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.moveTo(zx+3,zy+3); ctx.lineTo(zx+z.size-3,zy+z.size-3); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(zx+z.size-3,zy+3); ctx.lineTo(zx+3,zy+z.size-3); ctx.stroke();
          } else {
            ctx.fillStyle=z.color; ctx.fillRect(zx,zy,z.size,z.size);
            ctx.strokeStyle=z.borderColor; ctx.lineWidth=2; ctx.strokeRect(zx+1,zy+1,z.size-2,z.size-2);
          }
          // HP bar — pixel style
          ctx.fillStyle='#1a0000'; ctx.fillRect(z.x-zhs,zy-7,z.size,4);
          const hpPct = z.hp/z.maxHp;
          ctx.fillStyle = hpPct > 0.5 ? '#55a049' : hpPct > 0.25 ? '#bfce72' : '#883232';
          ctx.fillRect(z.x-zhs,zy-7,Math.floor(z.size*hpPct),4);
        }

        for (let b of this.bullets) {
          ctx.save();
          switch(b.weapon) {
            case 'shotgun': ctx.fillStyle='#bfce72'; ctx.fillRect(b.x-2,b.y-2,4,4); break;
            case 'smg': { const a=Math.atan2(b.vy,b.vx); ctx.fillStyle='#c8a800'; ctx.translate(b.x,b.y); ctx.rotate(a); ctx.fillRect(-5,-1,10,2); break; }
            case 'lmg': { const a=Math.atan2(b.vy,b.vx); ctx.fillStyle='#8b5429'; ctx.translate(b.x,b.y); ctx.rotate(a); ctx.fillRect(-7,-2,14,4); break; }
            case 'ar':  { const a=Math.atan2(b.vy,b.vx); ctx.fillStyle='#55a049'; ctx.translate(b.x,b.y); ctx.rotate(a); ctx.fillRect(-6,-1,12,3); break; }
            case 'minigun': ctx.fillStyle='#d14da0'; ctx.fillRect(b.x-2,b.y-2,4,4); break;
            case 'raygun': ctx.fillStyle='#6fcfcf'; ctx.fillRect(b.x-4,b.y-4,8,8); ctx.strokeStyle='#ffffff'; ctx.lineWidth=1; ctx.strokeRect(b.x-4,b.y-4,8,8); break;
            case 'thundergun': ctx.fillStyle='#883232'; ctx.fillRect(b.x-5,b.y-5,10,10); ctx.fillStyle='#ffffff'; ctx.fillRect(b.x-2,b.y-2,4,4); break;
            case 'plasma': ctx.fillStyle='#8b3f96'; ctx.fillRect(b.x-4,b.y-4,8,8); ctx.fillStyle='#d14da0'; ctx.fillRect(b.x-2,b.y-2,4,4); break;
            default: ctx.fillStyle=b.color||'#ffffff'; ctx.fillRect(b.x-2,b.y-2,4,4);
          }
          ctx.restore();
        }

        // ── Particles — pixel squares only, no arcs, no shadowBlur ──
        ctx.save();
        let lastPColor = null;
        for (let i = 0; i < this.PARTICLE_POOL_SIZE; i++) {
          const pt = this.particles[i];
          if (pt.life <= 0) continue;
          const alpha = pt.life / pt.maxLife;
          if (pt.color !== lastPColor) { ctx.fillStyle = pt.color; lastPColor = pt.color; }
          ctx.globalAlpha = alpha;
          const d = Math.max(2, Math.floor(pt.size * alpha * 0.8));
          ctx.fillRect(Math.floor(pt.x - d/2), Math.floor(pt.y - d/2), d, d);
        }
        ctx.globalAlpha = 1;
        ctx.restore();

        // ── Melee stab — short line extending from player, retracts ──
        for (let f of this.meleeFlashes) {
          const progress = 1 - f.timer / 8; // 0=just started, 1=done
          const stabLen = progress < 0.5
            ? MELEE_RANGE * (progress / 0.5)           // extend out
            : MELEE_RANGE * (1 - (progress - 0.5) / 0.5); // retract back
          const ex = f.x + Math.cos(f.angle) * stabLen;
          const ey = f.y + Math.sin(f.angle) * stabLen;
          ctx.save();
          ctx.strokeStyle = f.color; ctx.lineWidth = 3;
          ctx.beginPath(); ctx.moveTo(f.x, f.y); ctx.lineTo(ex, ey); ctx.stroke();
          // Pixel tip square
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(ex - 3, ey - 3, 6, 6);
          ctx.restore();
        }

        // ── BOSS RENDER — C64 style, no shadowBlur ───────────────────
        if (this.boss && !this.boss.dead) {
          const b = this.boss;
          const flashing = b.flashTimer > 0 && b.flashTimer % 2 === 0;

          // Boss bullets — pixel squares
          for (let bb of b.bossBullets) {
            ctx.fillStyle = flashing ? '#ffffff' : bb.color;
            ctx.fillRect(bb.x-4, bb.y-4, 8, 8);
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
            ctx.strokeRect(bb.x-4, bb.y-4, 8, 8);
          }

          if (b.type==='triangle') {
            ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.rotation);
            // Dithered purple fill
            ctx.fillStyle = flashing ? '#ffffff' : '#3d0c69';
            ctx.beginPath();
            for(let i=0;i<3;i++){const a=-Math.PI/2+(i*2*Math.PI/3);i===0?ctx.moveTo(Math.cos(a)*b.radius,Math.sin(a)*b.radius):ctx.lineTo(Math.cos(a)*b.radius,Math.sin(a)*b.radius);}
            ctx.closePath(); ctx.fill();
            if (!flashing) {
              ctx.fillStyle='#6a1a9a';
              ctx.save(); ctx.clip();
              for(let px=-b.radius;px<b.radius;px+=4) for(let py=-b.radius;py<b.radius;py+=4) ctx.fillRect(px,py,2,2);
              ctx.restore();
            }
            ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
            ctx.beginPath();
            for(let i=0;i<3;i++){const a=-Math.PI/2+(i*2*Math.PI/3);i===0?ctx.moveTo(Math.cos(a)*b.radius,Math.sin(a)*b.radius):ctx.lineTo(Math.cos(a)*b.radius,Math.sin(a)*b.radius);}
            ctx.closePath(); ctx.stroke();
            ctx.restore();
            // Tip hitpoints — red pixel squares
            const tAngles=[b.rotation-Math.PI/2,b.rotation-Math.PI/2+(2*Math.PI/3),b.rotation-Math.PI/2+(4*Math.PI/3)];
            for(let t=0;t<3;t++){
              if(b.tips[t].hp<=0)continue;
              const tx=b.x+Math.cos(tAngles[t])*b.radius,ty=b.y+Math.sin(tAngles[t])*b.radius;
              const sz=14+Math.floor((b.tips[t].hp/b.tips[t].maxHp)*8);
              ctx.fillStyle=flashing?'#ffffff':'#883232'; ctx.fillRect(tx-sz/2,ty-sz/2,sz,sz);
              ctx.strokeStyle='#b86962'; ctx.lineWidth=2; ctx.strokeRect(tx-sz/2+1,ty-sz/2+1,sz-2,sz-2);
              const bw=sz*2; ctx.fillStyle='#1a0000'; ctx.fillRect(tx-bw/2,ty+sz/2+3,bw,4);
              ctx.fillStyle='#883232'; ctx.fillRect(tx-bw/2,ty+sz/2+3,bw*(b.tips[t].hp/b.tips[t].maxHp),4);
            }

          } else if (b.type==='octagon') {
            ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.rotation);
            // Dithered orange-brown fill
            ctx.fillStyle = flashing ? '#ffffff' : '#7a3b00';
            ctx.beginPath();
            for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;i===0?ctx.moveTo(Math.cos(a)*b.radius,Math.sin(a)*b.radius):ctx.lineTo(Math.cos(a)*b.radius,Math.sin(a)*b.radius);}
            ctx.closePath(); ctx.fill();
            if (!flashing) {
              ctx.fillStyle='#8b5429'; ctx.save(); ctx.clip();
              for(let px=-b.radius;px<b.radius;px+=4) for(let py=-b.radius;py<b.radius;py+=4) ctx.fillRect(px,py,2,2);
              ctx.restore();
            }
            ctx.strokeStyle='#c8a800'; ctx.lineWidth=3;
            ctx.beginPath();
            for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;i===0?ctx.moveTo(Math.cos(a)*b.radius,Math.sin(a)*b.radius):ctx.lineTo(Math.cos(a)*b.radius,Math.sin(a)*b.radius);}
            ctx.closePath(); ctx.stroke();
            ctx.restore();
            // Corner hitpoints — orange squares INSIDE the outline
            for(let i=0;i<8;i++){
              if(b.corners[i].hp<=0)continue;
              const a=b.rotation+(i/8)*Math.PI*2;
              const cx=b.x+Math.cos(a)*(b.radius-10), cy=b.y+Math.sin(a)*(b.radius-10);
              const sz=12+Math.floor((b.corners[i].hp/b.corners[i].maxHp)*6);
              ctx.fillStyle=flashing?'#ffffff':'#c8a800'; ctx.fillRect(cx-sz/2,cy-sz/2,sz,sz);
              ctx.strokeStyle='#ffffff'; ctx.lineWidth=1; ctx.strokeRect(cx-sz/2+1,cy-sz/2+1,sz-2,sz-2);
            }

          } else if (b.type==='pentagon') {
            ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.rotation);
            for (let i = 0; i < 5; i++) {
              const panel = b.panels[i];
              if (panel.state === 'dead' || panel.state === 'flying') continue;
              const aStart=(i/5)*Math.PI*2-Math.PI/2, aEnd=((i+1)/5)*Math.PI*2-Math.PI/2, gap=0.18;
              const hp_r=panel.hp/panel.maxHp;
              ctx.beginPath(); ctx.moveTo(0,0);
              ctx.arc(0,0,b.radius,aStart+gap,aEnd-gap); ctx.closePath();
              ctx.fillStyle=flashing?'#ffffff':'#40318d'; ctx.fill();
              if (!flashing) {
                ctx.fillStyle=`rgba(120,105,196,${0.4+0.4*hp_r})`; ctx.save(); ctx.clip();
                for(let px=-b.radius;px<b.radius;px+=4) for(let py=-b.radius;py<b.radius;py+=4) ctx.fillRect(px,py,2,2);
                ctx.restore();
              }
              ctx.strokeStyle='#7869c4'; ctx.lineWidth=2;
              ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,b.radius,aStart+gap,aEnd-gap); ctx.closePath(); ctx.stroke();
              // Panel HP square indicator
              const midA=(aStart+aEnd)/2+gap;
              const px=Math.cos(midA)*b.radius*0.7, py=Math.sin(midA)*b.radius*0.7;
              const sz=10+Math.floor(hp_r*8);
              ctx.fillStyle=flashing?'#fff':'#6fcfcf'; ctx.fillRect(px-sz/2,py-sz/2,sz,sz);
            }
            ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*2);
            ctx.fillStyle=b.rage?(flashing?'#fff':'#6fcfcf'):(flashing?'#fff':'#40318d'); ctx.fill();
            if (b.rage) {
              const hp_r=b.coreHp/b.coreMaxHp;
              ctx.restore();
              ctx.fillStyle='#001133'; ctx.fillRect(b.x-30,b.y+38,60,5);
              ctx.fillStyle='#7869c4'; ctx.fillRect(b.x-30,b.y+38,60*hp_r,5);
            } else { ctx.restore(); }
            if (b.boomerang && b.activePanel >= 0) {
              const bm=b.boomerang, hp_r=b.panels[b.activePanel].hp/b.panels[b.activePanel].maxHp;
              ctx.save(); ctx.translate(bm.x,bm.y); ctx.rotate(bm.t*Math.PI*4);
              ctx.beginPath(); ctx.arc(0,0,28,-Math.PI/4,Math.PI/4); ctx.lineTo(0,0); ctx.closePath();
              ctx.fillStyle=flashing?'#fff':'#40318d'; ctx.fill();
              ctx.strokeStyle='#7869c4'; ctx.lineWidth=2; ctx.stroke();
              ctx.fillStyle='#ffffff'; ctx.fillRect(-4,-4,8,8);
              ctx.restore();
            }

          } else if (b.type==='diamond') {
            if (!b.split) {
              ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.rotation);
              const hp_r=b.coreHp/b.coreMaxHp;
              ctx.beginPath(); ctx.moveTo(0,-b.radius); ctx.lineTo(b.radius*0.6,0); ctx.lineTo(0,b.radius); ctx.lineTo(-b.radius*0.6,0); ctx.closePath();
              ctx.fillStyle=flashing?'#ffffff':'#8b3f96'; ctx.fill();
              if (!flashing) {
                ctx.fillStyle='#d14da0'; ctx.save(); ctx.clip();
                for(let px=-b.radius;px<b.radius;px+=4) for(let py=-b.radius;py<b.radius;py+=4) ctx.fillRect(px,py,2,2);
                ctx.restore();
              }
              ctx.strokeStyle='#d14da0'; ctx.lineWidth=2;
              ctx.beginPath(); ctx.moveTo(0,-b.radius); ctx.lineTo(b.radius*0.6,0); ctx.lineTo(0,b.radius); ctx.lineTo(-b.radius*0.6,0); ctx.closePath(); ctx.stroke();
              // HP bar as pixel rect
              ctx.fillStyle='#1a0000'; ctx.fillRect(-28,-5,56,10);
              ctx.fillStyle=flashing?'#fff':'#d14da0'; ctx.fillRect(-28,-5,56*hp_r,10);
              ctx.restore();
            } else {
              for(let s of b.shards){
                if(!s.alive)continue;
                ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.rotation);
                ctx.beginPath(); ctx.moveTo(0,-s.radius); ctx.lineTo(s.radius*0.6,0); ctx.lineTo(0,s.radius); ctx.lineTo(-s.radius*0.6,0); ctx.closePath();
                ctx.fillStyle=flashing?'#ffffff':'#8b3f96'; ctx.fill();
                ctx.strokeStyle='#d14da0'; ctx.lineWidth=2; ctx.stroke();
                const bw=s.radius*1.2;
                ctx.fillStyle='#1a0000'; ctx.fillRect(-bw/2,s.radius+4,bw,4);
                ctx.fillStyle='#d14da0'; ctx.fillRect(-bw/2,s.radius+4,bw*(s.hp/s.maxHp),4);
                ctx.restore();
              }
            }

          } else if (b.type==='spiral') {
            const consumePulse = b.consumeFlash > 0;
            ctx.save(); ctx.translate(b.x,b.y);
            for(let i=0;i<5;i++){
              const arm=b.arms[i]; if(arm.hp<=0)continue;
              const regrowing=arm.regrowing>0;
              if(arm.regrowing>0) arm.regrowing--;
              const armA=b.rotation+(i/5)*Math.PI*2,ext=b.radius+60+Math.sin(b.breathe+i)*30,hp_r=arm.hp/arm.maxHp;
              const armColor=regrowing?'#883232':consumePulse?'#883232':flashing?'#ffffff':'#55a049';
              ctx.save();
              // Thick pixel line (no shadowBlur)
              ctx.strokeStyle=armColor; ctx.lineWidth=5;
              ctx.beginPath();
              const midA=armA+0.4,mx=Math.cos(midA)*ext*0.6,my=Math.sin(midA)*ext*0.6;
              ctx.moveTo(0,0); ctx.quadraticCurveTo(mx,my,Math.cos(armA)*ext,Math.sin(armA)*ext); ctx.stroke();
              ctx.restore();
              // Tip square
              const tipX=Math.cos(armA)*ext,tipY=Math.sin(armA)*ext;
              const tsz=12+Math.floor(hp_r*6);
              ctx.fillStyle=regrowing?'#883232':consumePulse?'#883232':flashing?'#fff':'#94e089';
              ctx.fillRect(tipX-tsz/2,tipY-tsz/2,tsz,tsz);
              ctx.strokeStyle='#ffffff'; ctx.lineWidth=1; ctx.strokeRect(tipX-tsz/2+1,tipY-tsz/2+1,tsz-2,tsz-2);
              ctx.fillStyle='#003311'; ctx.fillRect(tipX-20,tipY+tsz/2+3,40,4);
              ctx.fillStyle='#55a049'; ctx.fillRect(tipX-20,tipY+tsz/2+3,40*hp_r,4);
            }
            // Core — pixel square
            ctx.fillStyle=consumePulse?'#883232':flashing?'#ffffff':'#55a049';
            ctx.fillRect(-14,-14,28,28);
            ctx.strokeStyle='#94e089'; ctx.lineWidth=2; ctx.strokeRect(-13,-13,26,26);
            ctx.restore();
            if (b.consumingZombies && b.consumingZombies.length > 0) {
              for (const cz of b.consumingZombies) {
                const scale=Math.max(0.15,1-cz.t*0.85), sz=cz.size*scale;
                ctx.save(); ctx.globalAlpha=1-cz.t*0.5;
                ctx.fillStyle=cz.color; ctx.strokeStyle='#883232'; ctx.lineWidth=2;
                ctx.fillRect(cz.x-sz/2,cz.y-sz/2,sz,sz); ctx.strokeRect(cz.x-sz/2,cz.y-sz/2,sz,sz);
                ctx.restore();
              }
            }
            if (b.summonPhase==='summoning') {
              const secs=Math.ceil(b.summonKillTimer/60);
              ctx.save(); ctx.fillStyle='#bfce72'; ctx.font='7px "Press Start 2P", monospace';
              ctx.textAlign='center'; ctx.textBaseline='middle';
              ctx.fillText(`KILL ADDS ${secs}s`,b.x,b.y-b.radius-30); ctx.restore();
            }

          } else if (b.type==='fractal') {
            for(let piece of b.pieces){
              if(!piece.alive)continue;
              ctx.save(); ctx.translate(piece.x,piece.y); ctx.rotate(piece.rotation);
              const hp_r=piece.hp/piece.maxHp;
              // Dithered gold fill
              ctx.fillStyle=flashing?'#ffffff':'#574200';
              ctx.beginPath();
              for(let i=0;i<3;i++){const a=-Math.PI/2+(i*2*Math.PI/3);i===0?ctx.moveTo(Math.cos(a)*piece.radius,Math.sin(a)*piece.radius):ctx.lineTo(Math.cos(a)*piece.radius,Math.sin(a)*piece.radius);}
              ctx.closePath(); ctx.fill();
              if (!flashing) {
                ctx.fillStyle='#c8a800'; ctx.save(); ctx.clip();
                for(let px=-piece.radius;px<piece.radius;px+=4) for(let py=-piece.radius;py<piece.radius;py+=4) ctx.fillRect(px,py,2,2);
                ctx.restore();
              }
              ctx.strokeStyle='#c8a800'; ctx.lineWidth=2;
              ctx.beginPath();
              for(let i=0;i<3;i++){const a=-Math.PI/2+(i*2*Math.PI/3);i===0?ctx.moveTo(Math.cos(a)*piece.radius,Math.sin(a)*piece.radius):ctx.lineTo(Math.cos(a)*piece.radius,Math.sin(a)*piece.radius);}
              ctx.closePath(); ctx.stroke();
              const bw=piece.radius*1.4;
              ctx.fillStyle='#1a0a00'; ctx.fillRect(-bw/2,piece.radius+4,bw,4);
              ctx.fillStyle='#c8a800'; ctx.fillRect(-bw/2,piece.radius+4,bw*hp_r,4);
              ctx.restore();
            }

          } else if (b.type === 'octopus') {
            // Tentacles first (behind body)
            for (let i = 0; i < b.tentacles.length; i++) {
              const t = b.tentacles[i];
              const baseAngle=b.rotation+(i/b.tentacles.length)*Math.PI*2;
              const baseX=b.x+Math.cos(baseAngle)*b.radius, baseY=b.y+Math.sin(baseAngle)*b.radius;
              if (!t.alive) {
                ctx.save(); ctx.strokeStyle='#330033'; ctx.lineWidth=3; ctx.globalAlpha=0.35;
                ctx.setLineDash([3,4]);
                ctx.beginPath(); ctx.moveTo(baseX,baseY);
                ctx.lineTo(baseX+Math.cos(baseAngle)*18,baseY+Math.sin(baseAngle)*18); ctx.stroke();
                ctx.setLineDash([]); ctx.restore();
                continue;
              }
              const hp_r=t.hp/t.maxHp;
              const isActive=t.state!=='idle';
              const tentColor=flashing?'#ffffff':isActive?'#d14da0':'#8b3f96';
              const midX=baseX+(t.tipX-baseX)*0.5+Math.cos(baseAngle+Math.PI/2)*30;
              const midY=baseY+(t.tipY-baseY)*0.5+Math.sin(baseAngle+Math.PI/2)*30;
              ctx.save();
              // Dashed line for non-active tentacles, solid for active
              if (!isActive) ctx.setLineDash([6,3]);
              ctx.strokeStyle=tentColor; ctx.lineWidth=isActive?6:4;
              ctx.beginPath(); ctx.moveTo(baseX,baseY);
              ctx.quadraticCurveTo(midX,midY,t.tipX,t.tipY); ctx.stroke();
              ctx.setLineDash([]);
              // Tip square
              const tsz=10+Math.floor(hp_r*6);
              ctx.fillStyle=isActive?'#d14da0':tentColor; ctx.fillRect(t.tipX-tsz/2,t.tipY-tsz/2,tsz,tsz);
              ctx.strokeStyle='#ffffff'; ctx.lineWidth=1; ctx.strokeRect(t.tipX-tsz/2+1,t.tipY-tsz/2+1,tsz-2,tsz-2);
              ctx.fillStyle='#1a0010'; ctx.fillRect(t.tipX-14,t.tipY+tsz/2+2,28,4);
              ctx.fillStyle='#d14da0'; ctx.fillRect(t.tipX-14,t.tipY+tsz/2+2,28*hp_r,4);
              ctx.restore();
            }
            // Body — dithered purple square
            const bsz=b.radius*2;
            ctx.fillStyle=flashing?'#ffffff':'#3d0c69';
            ctx.fillRect(b.x-b.radius,b.y-b.radius,bsz,bsz);
            ctx.fillStyle='#6a1a9a';
            for(let px=b.x-b.radius;px<b.x+b.radius;px+=4) for(let py=b.y-b.radius;py<b.y+b.radius;py+=4) ctx.fillRect(px,py,2,2);
            ctx.strokeStyle='#d14da0'; ctx.lineWidth=3;
            ctx.strokeRect(b.x-b.radius+1,b.y-b.radius+1,bsz-2,bsz-2);
            // Eye ring
            ctx.strokeStyle='#8b3f96'; ctx.lineWidth=4;
            ctx.beginPath(); ctx.arc(b.x,b.y,b.radius*0.45,0,Math.PI*2); ctx.stroke();
            // Pupil
            let nearestP=null,nearestD=Infinity;
            for(let p of this.players){if(!p.alive||!p.connected)continue;const d=Math.hypot(p.x-b.x,p.y-b.y);if(d<nearestD){nearestD=d;nearestP=p;}}
            if(nearestP){
              const ea=Math.atan2(nearestP.y-b.y,nearestP.x-b.x),er=b.radius*0.18;
              ctx.fillStyle=flashing?'#fff':'#d14da0';
              ctx.fillRect(b.x+Math.cos(ea)*er-5,b.y+Math.sin(ea)*er-5,10,10);
            }
            // Tentacle count
            const aliveTentacles=b.tentacles.filter(t=>t.alive).length;
            ctx.fillStyle='#d14da0'; ctx.font='7px "Press Start 2P", monospace';
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(`${aliveTentacles}/8`,b.x,b.y+b.radius*0.55);
            // Grabbed/thrown players
            for(let p of this.players){
              if(!p.grabbed)continue;
              const shake=Math.sin(Date.now()/40)*6;
              ctx.save(); ctx.globalAlpha=0.85; ctx.fillStyle=p.color;
              ctx.fillRect(b.x-this.PLAYER_SIZE/2+shake,b.y-this.PLAYER_SIZE/2,this.PLAYER_SIZE,this.PLAYER_SIZE); ctx.restore();
            }
            for(let p of this.players){
              if(!p.thrownVx&&!p.thrownVy)continue;
              ctx.save(); ctx.globalAlpha=0.7; ctx.fillStyle='#d14da0';
              ctx.fillRect(p.x-this.PLAYER_SIZE/2,p.y-this.PLAYER_SIZE/2,this.PLAYER_SIZE,this.PLAYER_SIZE); ctx.restore();
            }

          } else if (b.type === 'snake') {
            const hp_r=b.hp/b.maxHp;
            for(const bb of b.bossBullets){
              ctx.fillStyle='#55a049'; ctx.fillRect(bb.x-4,bb.y-4,8,8);
              ctx.strokeStyle='#94e089'; ctx.lineWidth=1; ctx.strokeRect(bb.x-4,bb.y-4,8,8);
            }
            for(let si=b.segs.length-1;si>=1;si--){
              const s=b.segs[si],fade=si/b.segs.length;
              const segR=BOSS_CONFIGS.snake.radius*(0.62+0.38*(1-fade));
              ctx.fillStyle=flashing?'#ffffff':'#003300';
              ctx.fillRect(s.x-segR,s.y-segR,segR*2,segR*2);
              ctx.strokeStyle='#55a049'; ctx.lineWidth=1; ctx.strokeRect(s.x-segR+1,s.y-segR+1,segR*2-2,segR*2-2);
            }
            const head=b.segs[0],headR=BOSS_CONFIGS.snake.radius;
            ctx.fillStyle=flashing?'#ffffff':'#55a049';
            ctx.fillRect(head.x-headR,head.y-headR,headR*2,headR*2);
            ctx.strokeStyle='#94e089'; ctx.lineWidth=2;
            ctx.strokeRect(head.x-headR+1,head.y-headR+1,headR*2-2,headR*2-2);
            [b.angle-0.55,b.angle+0.55].forEach(ea=>{
              const ex=head.x+Math.cos(ea)*headR*0.55,ey=head.y+Math.sin(ea)*headR*0.55;
              ctx.fillStyle='#bfce72'; ctx.fillRect(ex-3,ey-3,6,6);
              ctx.fillStyle='#000'; ctx.fillRect(ex-1,ey-1,3,3);
            });
            if(Math.floor(Date.now()/120)%3!==0){
              const tx=head.x+Math.cos(b.angle)*(headR+2),ty=head.y+Math.sin(b.angle)*(headR+2);
              ctx.strokeStyle='#883232'; ctx.lineWidth=2;
              ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx+Math.cos(b.angle)*12,ty+Math.sin(b.angle)*12); ctx.stroke();
              [-0.4,0.4].forEach(fork=>{
                ctx.beginPath(); ctx.moveTo(tx+Math.cos(b.angle)*12,ty+Math.sin(b.angle)*12);
                ctx.lineTo(tx+Math.cos(b.angle+fork)*20,ty+Math.sin(b.angle+fork)*20); ctx.stroke();
              });
            }
            ctx.fillStyle='#001a00'; ctx.fillRect(head.x-32,head.y-headR-14,64,6);
            ctx.fillStyle='#55a049'; ctx.fillRect(head.x-32,head.y-headR-14,64*hp_r,6);
          }

          // Boss label — pixel font
          ctx.fillStyle='#d14da0'; ctx.font='7px "Press Start 2P", monospace';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          if (!b.dropping) ctx.fillText(b.label||'BOSS', b.x, b.y-(b.radius||80)-22);
        }

        // ── Border — C64 style, hard pixel, no glow ──────────────────
        ctx.strokeStyle='#7869c4'; ctx.lineWidth=4;
        ctx.strokeRect(2,2,W-4,H-4);
        ctx.strokeStyle='#40318d'; ctx.lineWidth=1;
        ctx.strokeRect(6,6,W-12,H-12);

        // ── Players ──────────────────────────────────────────────────
        for (let p of this.players) {
          if (!p.connected) continue;
          if (p.alive) {
            // Player body — flat fill, hard 2px outline
            ctx.fillStyle=p.color;
            ctx.fillRect(p.x-hs,p.y-hs,this.PLAYER_SIZE,this.PLAYER_SIZE);
            ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
            ctx.strokeRect(p.x-hs+1,p.y-hs+1,this.PLAYER_SIZE-2,this.PLAYER_SIZE-2);
            // Aim direction — pixel line
            ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
            ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+Math.cos(p.angle)*(hs+10),p.y+Math.sin(p.angle)*(hs+10)); ctx.stroke();
            // HP bar
            ctx.fillStyle='#1a0000'; ctx.fillRect(p.x-hs,p.y-hs-8,this.PLAYER_SIZE,4);
            ctx.fillStyle=p.hp/p.maxHp>0.5?'#55a049':p.hp/p.maxHp>0.25?'#bfce72':'#883232';
            ctx.fillRect(p.x-hs,p.y-hs-8,this.PLAYER_SIZE*(p.hp/p.maxHp),4);
            // Points
            ctx.fillStyle='#bfce72'; ctx.font='6px "Press Start 2P", monospace';
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText('$'+p.points,p.x,p.y-hs-18);
            if(p.ammo===0){
              ctx.fillStyle='#94e089'; ctx.font='6px "Press Start 2P", monospace';
              ctx.fillText('KNIFE',p.x,p.y-hs-28);
            }
          } else {
            ctx.fillStyle='#1a1a2a'; ctx.fillRect(p.x-hs,p.y-hs,this.PLAYER_SIZE,this.PLAYER_SIZE);
            ctx.strokeStyle='#505050'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
            ctx.strokeRect(p.x-hs+1,p.y-hs+1,this.PLAYER_SIZE-2,this.PLAYER_SIZE-2); ctx.setLineDash([]);
            for(let[,attempt]of this.reviveMap){
              if(attempt.targetSlot===p.slot){
                const progress=Math.min((Date.now()-attempt.startTime)/this.REVIVE_TIME,1);
                ctx.strokeStyle='#6fcfcf'; ctx.lineWidth=3;
                ctx.beginPath(); ctx.arc(p.x,p.y,hs+8,-Math.PI/2,-Math.PI/2+Math.PI*2*progress); ctx.stroke();
              }
            }
          }
          ctx.fillStyle='#ffffff'; ctx.font='bold 10px "Press Start 2P", monospace';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('P'+p.slot,p.x,p.y);
        }

        this.updateHUD();
      }

      updateHUD() {
        if (++this._hudFrame % 10 !== 0) return;
        document.getElementById('wave').textContent         = this.wave;
        document.getElementById('zombie-count').textContent = this.zombies.length;
        document.getElementById('player-count').textContent = this.connectedCount();
      }

      canUseMysteryBox(player) {
        if (!this.mysteryBox||!player.alive) return false;
        const dx=player.x-this.mysteryBox.x,dy=player.y-this.mysteryBox.y;
        return Math.sqrt(dx*dx+dy*dy)<=BOX_USE_RANGE;
      }

      canUseVending(player) {
        if (!this.vendingMachine||!player.alive) return false;
        const dx=player.x-this.vendingMachine.x,dy=player.y-this.vendingMachine.y;
        return Math.sqrt(dx*dx+dy*dy)<=VENDING_USE_RANGE;
      }

      start() {
        let lastTime = 0;
        const frameDelay = 1000 / 60;
        let broadcastFrame = 0;
        const loop = (currentTime) => {
          const deltaTime = currentTime - lastTime;
          if (deltaTime >= frameDelay) {
            try {
              this.update();
              this.render();
            } catch(e) {
              console.error('GAME LOOP ERROR:', e);
            }
            // Broadcast at 10hz (every 6 frames) to reduce server/network load for 4 players
            if (this.socket && this.roomCode && ++broadcastFrame % 6 === 0) {
              this.socket.emit('game-state-broadcast', {
                roomCode: this.roomCode,
                gameState: {
                  wave: this.wave,
                  zombiesRemaining: this.zombies.length,
                  gameOver: this.gameOver,
                  players: this.players.map(p => ({
                    health: p.hp,
                    maxHp: p.maxHp,
                    ammo: p.ammo === Infinity ? -1 : p.ammo,
                    isAlive: p.alive,
                    points: p.points,
                    weapon: p.currentWeapon,
                    canUseMysteryBox: this.canUseMysteryBox(p),
                    canUseVending: this.canUseVending(p),
                    vendingCost: this.vendingCost,
                  }))
                }
              });
            }
            lastTime = currentTime - (deltaTime % frameDelay);
          }
          requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
      }
    }

    const game   = new GameEngine();
    const socket = io({ transports: ['websocket'] });
    game.socket  = socket;

    socket.on('connect', () => socket.emit('create-room'));
    socket.on('room-created', (data) => {
      game.roomCode = data.roomCode;
      document.getElementById('room-code').textContent = data.roomCode;
      const qrUrl = `https://zombie-survival-zteam.fly.dev/controller.html?room=${data.roomCode}`;
      renderQR(document.getElementById('qr-code'), qrUrl);
      game.start();
    });

    socket.on('explosion',            (d) => game.spawnParticles(d.x, d.y, d.color));
    socket.on('player-joined',        (d) => game.addPlayer(d.slotNumber));
    socket.on('player-disconnected',  (d) => game.removePlayer(d.slotNumber));
    socket.on('player-removed',       (d) => game.removePlayer(d.slotNumber));
    socket.on('player-input',         (d) => game.handleInput(d.slotNumber, d.input));
    socket.on('mystery-box-purchase', (d) => game.handleMysteryBoxPurchase(d.slotNumber));
    socket.on('vending-purchase',     (d) => game.handleVendingPurchase(d.slotNumber));
    socket.on('lobby-update',         (d) => game.updateLobby(d.players));
    socket.on('ready-countdown', (d) => {
      const el = document.getElementById('countdown');
      el.style.display='block'; el.textContent=d.seconds;
      el.style.animation='none'; el.offsetHeight; el.style.animation='pop 0.3s ease';
    });
    socket.on('ready-countdown-cancelled', () => {
      document.getElementById('countdown').style.display = 'none';
    });
    socket.on('all-ready', (d) => {
      // Sync connected state from server before starting
      if (d && d.slots) d.slots.forEach(slot => game.addPlayer(slot));
      game.beginGame();
    });
    socket.on('player-reconnected', (d) => game.addPlayer(d.slotNumber));
    socket.on('restart-game', () => game.restart());
    socket.on('restart-vote-update', (d) => {
      document.getElementById('vote-display').textContent =
        `Restart votes: ${d.votes} / ${d.needed} - Vote YES on your phone!`;
    });


    const BASE_W = 1334;
    const BASE_H = 750;

    function scaleCanvas() {
      const container = document.getElementById('game-container');
      const canvas    = document.getElementById('canvas');
      const scale = Math.min(window.innerWidth / BASE_W, window.innerHeight / BASE_H);
      canvas.width  = BASE_W;
      canvas.height = BASE_H;
      container.style.width     = BASE_W + 'px';
      container.style.height    = BASE_H + 'px';
      container.style.transform = `scale(${scale})`;
      container.style.transformOrigin = 'top left';
      const scaledW = BASE_W * scale;
      const scaledH = BASE_H * scale;
      container.style.position = 'absolute';
      container.style.left = Math.floor((window.innerWidth  - scaledW) / 2) + 'px';
      container.style.top  = Math.floor((window.innerHeight - scaledH) / 2) + 'px';
    }

    scaleCanvas();
    window.addEventListener('resize', scaleCanvas);
    window.addEventListener('orientationchange', () => setTimeout(scaleCanvas, 100));

  // ── Anti-tamper ──────────────────────────────────────────────────
  // Block right-click
  document.addEventListener('contextmenu', e => e.preventDefault());

  // Kill common shortcut keys for devtools
  document.addEventListener('keydown', e => {
    if (
      e.key === 'F12' ||
      (e.ctrlKey && e.shiftKey && ['I','J','C','K'].includes(e.key)) ||
      (e.metaKey && e.altKey && ['I','J','C'].includes(e.key)) ||
      (e.ctrlKey && e.key === 'U')
    ) { e.preventDefault(); e.stopPropagation(); }
  }, true);

  // Silence console so values can't be read
  (function() {
    const noop = () => {};
    ['log','warn','error','info','debug','dir','table','trace','group','groupEnd'].forEach(m => {
      try { console[m] = noop; } catch(_) {}
    });
  })();

  // Devtools size detection — desktop only, skip on touch/mobile devices
  let _devOpen = false;
  const _isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || navigator.maxTouchPoints > 1;
  if (!_isMobile) {
    setInterval(() => {
      const threshold = 200;
      const open = (window.outerWidth - window.innerWidth > threshold) ||
                   (window.outerHeight - window.innerHeight > threshold);
      if (open && !_devOpen) {
        _devOpen = true;
        document.body.style.filter = 'blur(8px)';
      } else if (!open && _devOpen) {
        _devOpen = false;
        document.body.style.filter = '';
      }
    }, 1000);
  }

  })(); // end IIFE
  </script>
</body>
</html>
