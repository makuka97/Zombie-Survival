<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Z-TEAM · Controller</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      touch-action: none;
      font-family: 'Press Start 2P', monospace;
      color: #fff;
      background: #000000;
    }

    #rotate-warning {
      display: none; position: fixed; inset: 0;
      background: #000000; z-index: 9999;
      flex-direction: column; align-items: center; justify-content: center;
      font-size: 14px; color: #7869c4; letter-spacing: 3px;
      text-align: center; gap: 20px;
    }
    #rotate-warning .arrow { font-size: 48px; animation: spin 2s linear infinite; }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

    body.joined-portrait #rotate-warning  { display: flex; }
    body.joined-portrait #lobby-screen    { display: none !important; }
    body.joined-portrait #ctrl-screen     { display: none !important; }
    body.joined-portrait #gameover-screen { display: none !important; }

    @media (orientation: landscape) {
      body.joined-portrait #rotate-warning { display: none; }
    }

    #join-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      width: 100vw; height: 100vh; gap: 16px;
    }
    #join-screen h1 { font-size: 20px; color: #883232; letter-spacing: 6px;
      text-shadow: 2px 2px 0 #3d0000, -1px -1px 0 #5a1a1a; }
    #join-screen h2 { font-size: 8px; color: #7869c4; letter-spacing: 4px; font-weight: normal; margin-top: 4px; }
    #room-code-input {
      width: 200px; height: 52px; font-size: 28px;
      text-align: center; background: #000000;
      border: 2px solid #7869c4;
      color: #ffffff; letter-spacing: 10px;
      font-family: 'Press Start 2P', monospace; outline: none;
    }
    #room-code-input:focus { border-color: #ffffff; }
    #join-btn {
      width: 200px; height: 48px; font-size: 11px;
      background: transparent; color: #ffffff;
      border: 2px solid #ffffff; letter-spacing: 3px;
      cursor: pointer; font-family: 'Press Start 2P', monospace;
      transition: all 0.08s;
    }
    #join-btn:active { background: #883232; border-color: #883232; transform: scale(0.96); }
    #join-error { color: #883232; font-size: 7px; min-height: 18px; letter-spacing: 2px; }

    #lobby-screen {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      width: 100vw; height: 100vh; gap: 20px;
      background: #000000;
    }
    #lobby-screen h1 { font-size: 16px; color: #883232; letter-spacing: 4px;
      text-shadow: 2px 2px 0 #3d0000; }
    #player-badge {
      font-size: 20px; padding: 12px 28px; border: 2px solid;
      letter-spacing: 3px;
    }
    #lobby-screen p { font-size: 7px; color: #40318d; letter-spacing: 2px; text-align: center; }

    #ready-btn {
      width: 240px; height: 72px; font-size: 16px;
      background: transparent; color: #55a049;
      border: 2px solid #55a049; letter-spacing: 4px;
      cursor: pointer; font-family: 'Press Start 2P', monospace;
      transition: all 0.1s;
    }
    #ready-btn:active { background: #55a049; color: #000000; transform: scale(0.95); }
    #ready-btn.voted {
      background: transparent; color: #40318d;
      border-color: #40318d; font-size: 11px;
    }
    #waiting-text {
      font-size: 7px; color: #7869c4; letter-spacing: 2px;
      min-height: 20px; animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%{opacity:1} 50%{opacity:0.2} 100%{opacity:1} }

    #ctrl-screen {
      display: none; flex-direction: column;
      width: 100vw; height: 100vh; position: relative;
      background: #000000;
    }
    #hud {
      position: absolute; top: 10px; left: 0; right: 0;
      display: flex; justify-content: space-between;
      padding: 0 16px; z-index: 10;
    }
    #weapon-display { font-size: 9px; color: #fff; letter-spacing: 1px; }
    #weapon-display span { font-size: 6px; color: #40318d; }
    #ammo-display { font-size: 11px; color: #bfce72; letter-spacing: 1px; }
    #ammo-display span { font-size: 6px; color: #40318d; letter-spacing: 1px; }
    #ammo-display.low { color: #883232; animation: flash 0.5s infinite; }
    #ammo-display.empty { color: #333355; }
    @keyframes flash { 0%{opacity:1} 50%{opacity:0.2} 100%{opacity:1} }
    #points-display { font-size: 10px; color: #bfce72; letter-spacing: 1px; }
    #points-display span { font-size: 6px; color: #40318d; }

    #controls {
      display: flex; flex: 1; align-items: center;
      justify-content: space-around; padding: 20px 40px;
      width: 100%; height: 100%;
    }

    /* Joystick — round */
    #joystick-zone {
      width: 190px; height: 190px;
      background: rgba(120,105,196,0.05);
      border: 2px solid #40318d;
      border-radius: 50%;
      position: relative; touch-action: none; flex-shrink: 0;
    }
    #joystick-zone::before, #joystick-zone::after {
      content: ''; position: absolute; background: rgba(64,49,141,0.3);
    }
    #joystick-zone::before { width:1px; height:100%; top:0; left:50%; transform:translateX(-50%); }
    #joystick-zone::after  { height:1px; width:100%; left:0; top:50%; transform:translateY(-50%); }
    #joystick-knob {
      width: 64px; height: 64px;
      background: #7869c4;
      border-radius: 50%;
      position: absolute; top:50%; left:50%;
      transform: translate(-50%,-50%); pointer-events: none;
    }

    /* Fire button — round */
    #fire-btn {
      width: 160px; height: 160px;
      background: rgba(136,50,50,0.1); border: 3px solid #883232;
      color: #883232; font-size: 14px;
      font-family: 'Press Start 2P', monospace; letter-spacing: 2px;
      display: flex; align-items: center; justify-content: center;
      touch-action: none; user-select: none; flex-shrink: 0;
      transition: all 0.08s;
      flex-direction: column; gap: 4px;
      border-radius: 50%;
    }
    #fire-btn.active { background: #883232; color: #000000; transform: scale(0.93); }
    #fire-btn.melee-mode { background: rgba(85,160,73,0.08); border-color: #55a049; color: #55a049; }
    #fire-btn.melee-mode.active { background: #55a049; color: #000000; transform: scale(0.93); }
    #fire-btn .btn-label { font-size: 10px; letter-spacing: 2px; }

    #melee-banner {
      position: absolute; top: 48px; left: 50%; transform: translateX(-50%);
      background: #000000; border: 2px solid #55a049;
      padding: 4px 14px; font-size: 8px;
      color: #55a049; letter-spacing: 2px; display: none; z-index: 20;
      animation: pulse 1.2s infinite;
    }

    /* Action / mystery box button — round */
    #action-btn {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 110px; height: 110px;
      font-size: 8px; line-height: 1.6;
      font-family: 'Press Start 2P', monospace; letter-spacing: 1px;
      border: 2px solid #1a1a3a;
      background: #000000; color: #222244;
      transition: all 0.15s; cursor: default;
      z-index: 20; pointer-events: none;
      border-radius: 50%;
    }
    #action-btn:active { transform: translate(-50%, -50%) scale(0.95); }
    #action-btn.mode-box {
      background: #000000; color: #8b3f96; border-color: #8b3f96;
      pointer-events: auto; cursor: pointer;
      animation: pulse-box 1s infinite;
    }
    #action-btn.mode-vend {
      background: #000000; color: #55a049; border-color: #55a049;
      pointer-events: auto; cursor: pointer;
      animation: pulse-vend 1s infinite;
    }
    #action-btn.mode-broke {
      background: #000000; color: #331111; border-color: #1a0000;
      pointer-events: none; cursor: default; animation: none;
    }

    @keyframes pulse-box {
      0%,100% { border-color: #8b3f96; } 50% { border-color: #d14da0; }
    }
    @keyframes pulse-vend {
      0%,100% { border-color: #55a049; } 50% { border-color: #94e089; }
    }

    #gameover-screen {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; width: 100vw; height: 100vh;
      gap: 20px; background: #000000;
    }
    #gameover-screen h1 { font-size: 32px; color: #883232; letter-spacing: 6px;
      text-shadow: 2px 2px 0 #3d0000; }
    #gameover-screen p  { font-size: 8px; color: #40318d; letter-spacing: 2px; }
    #restart-btn {
      width: 240px; height: 64px; font-size: 14px;
      background: transparent; color: #ffffff; border: 2px solid #ffffff;
      letter-spacing: 3px; cursor: pointer; font-family: 'Press Start 2P', monospace;
      transition: all 0.08s;
    }
    #restart-btn:active { background: #883232; border-color: #883232; transform: scale(0.95); }
    #restart-btn.voted { background: transparent; color: #40318d; border-color: #40318d; }
    #vote-status { font-size: 9px; color: #55a049; letter-spacing: 2px; min-height: 24px; }

    #status-bar {
      position: fixed; bottom: 4px; left: 50%;
      transform: translateX(-50%); font-size: 6px; color: #222244; letter-spacing: 1px;
    }
    #weapon-popup {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #000000; padding: 24px 40px;
      border: 2px solid #8b3f96;
      text-align: center; display: none; z-index: 100;
      animation: popup-appear 0.3s ease;
    }
    @keyframes popup-appear {
      0%   { transform: translate(-50%,-50%) scale(0.8); opacity:0; }
      100% { transform: translate(-50%,-50%) scale(1);   opacity:1; }
    }
    #weapon-popup h2 { font-size: 20px; color: #8b3f96; margin-bottom: 10px; }
    #weapon-popup p  { font-size: 10px; color: #fff; letter-spacing: 2px; }

    #mystery-box-btn { display: none; }
  </style>
</head>
<body>

  <div id="rotate-warning">
    <div class="arrow">↻</div>
    <div>ROTATE YOUR PHONE</div>
    <div style="font-size:7px;color:#40318d;letter-spacing:2px;margin-top:8px;">LANDSCAPE MODE REQUIRED</div>
  </div>

  <div id="join-screen">
    <h1>Z-TEAM</h1>
    <h2>ENTER ROOM CODE</h2>
    <input id="room-code-input" type="text" maxlength="4" placeholder="CODE" autocomplete="off">
    <button id="join-btn">JOIN GAME</button>
    <div id="join-error"></div>
  </div>

  <div id="lobby-screen">
    <h1>Z-TEAM</h1>
    <div id="player-badge">PLAYER ?</div>
    <p>WAITING FOR ALL PLAYERS...</p>
    <button id="ready-btn">READY UP</button>
    <div id="waiting-text"></div>
  </div>

  <div id="ctrl-screen">
    <div id="hud">
      <div id="weapon-display"><span>WEAPON </span>PISTOL</div>
      <div id="points-display"><span>$ </span>0</div>
      <div id="ammo-display"><span>AMMO </span>30</div>
    </div>
    <div id="melee-banner">⚔ KNIFE MODE — FIND AMMO!</div>
    <div id="controls">
      <div id="joystick-zone"><div id="joystick-knob"></div></div>
      <div id="fire-btn"><div class="btn-label">FIRE</div></div>
    </div>
    <button id="mystery-box-btn" disabled>MYSTERY<br>BOX<br>$950</button>
    <button id="action-btn">—</button>
  </div>

  <div id="gameover-screen">
    <h1>GAME OVER</h1>
    <p>All players have fallen</p>
    <button id="restart-btn">RESTART</button>
    <div id="vote-status"></div>
  </div>

  <div id="weapon-popup">
    <h2 id="weapon-popup-name">SMG</h2>
    <p>Weapon Acquired!</p>
  </div>

  <div id="status-bar">CONNECTING...</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>

    class Joystick {
      constructor(zoneId, knobId) {
        this.zone   = document.getElementById(zoneId);
        this.knob   = document.getElementById(knobId);
        this.angle  = null;
        this.active = false;
        this.maxR   = 58;
        const o = { passive: false };
        this.zone.addEventListener('touchstart',  e => this.onStart(e), o);
        this.zone.addEventListener('touchmove',   e => this.onMove(e),  o);
        this.zone.addEventListener('touchend',    e => this.onEnd(e),   o);
        this.zone.addEventListener('touchcancel', e => this.onEnd(e),   o);
        this.zone.addEventListener('mousedown',   e => this.onStart(e));
        this.zone.addEventListener('mousemove',   e => this.onMove(e));
        this.zone.addEventListener('mouseup',     e => this.onEnd(e));
        this.zone.addEventListener('mouseleave',  e => this.onEnd(e));
      }
      getOffset(e) {
        const rect = this.zone.getBoundingClientRect();
        const src  = e.touches ? e.touches[0] : e;
        return { x: src.clientX - rect.left - rect.width/2, y: src.clientY - rect.top - rect.height/2 };
      }
      onStart(e) { e.preventDefault(); this.active = true; this.onMove(e); }
      onMove(e) {
        if (!this.active) return;
        e.preventDefault();
        const { x, y } = this.getOffset(e);
        this.angle = Math.atan2(y, x);
        const clamp = Math.min(Math.sqrt(x*x + y*y), this.maxR);
        this.knob.style.transform = `translate(calc(-50% + ${Math.cos(this.angle)*clamp}px), calc(-50% + ${Math.sin(this.angle)*clamp}px))`;
      }
      onEnd(e) { e.preventDefault(); this.active = false; this.angle = null; this.knob.style.transform = 'translate(-50%, -50%)'; }
      getAngle() { return this.active ? this.angle : null; }
    }

    class ControllerLink {
      constructor() {
        this.socket      = io({ transports: ['websocket'] });
        this.roomCode    = null;
        this.slot        = null;
        this.color       = null;
        this.firing      = false;
        this.meleeing    = false;
        this.inMeleeMode = false;
        this.joystick    = new Joystick('joystick-zone', 'joystick-knob');
        this.loop        = null;
        this.hasVoted    = false;
        this.isReady     = false;
        this.ammo        = 30;
        this.points      = 0;
        this.weapon      = 'pistol';
        this.canUseMysteryBox = false;
        this.canUseVending    = false;

        this.loadFingerprint();
        this.bindSocket();
        this.bindFireBtn();
        this.bindJoinUI();
        this.bindReadyBtn();
        this.bindRestartBtn();
        this.bindActionBtn();
        this.checkDeepLink();
      }

      loadFingerprint() {
        this.fp = localStorage.getItem('zs-fp');
        if (!this.fp) {
          this.fp = 'fp-' + Date.now() + '-' + Math.random().toString(36).slice(2);
          localStorage.setItem('zs-fp', this.fp);
        }
      }

      checkDeepLink() {
        const params = new URLSearchParams(window.location.search);
        const code   = params.get('room');
        if (code && code.length === 4) {
          document.getElementById('room-code-input').value = code.toUpperCase();
          setTimeout(() => this.join(code.toUpperCase()), 600);
        }
      }

      bindSocket() {
        this.socket.on('connect', () => {
          this.setStatus('CONNECTED');
          const urlRoom = new URLSearchParams(window.location.search).get('room');
          if (!urlRoom) {
            const saved = localStorage.getItem('zs-room');
            if (saved) this.join(saved);
          }
        });
        this.socket.on('disconnect', () => { this.setStatus('DISCONNECTED'); this.stopLoop(); });
        this.socket.on('join-success',  d => this.onJoinSuccess(d));
        this.socket.on('join-failed',   d => this.showError(d.reason));
        this.socket.on('ping',          () => this.socket.emit('pong'));
        this.socket.on('game-starting', () => { this.showController(); this.startLoop(); });
        this.socket.on('game-state-update', d => {
          this.updateAmmo(d.ammo);
          this.updatePoints(d.points);
          this.updateWeapon(d.weapon);
          this.updateActionButton(d.canUseMysteryBox, d.canUseVending, d.points, d.vendingCost);
          if (d.gameOver) this.showGameOver();
        });
        this.socket.on('ready-countdown', d => {
          document.getElementById('waiting-text').textContent = `Starting in ${d.seconds}...`;
        });
        this.socket.on('ready-countdown-cancelled', () => {
          document.getElementById('waiting-text').textContent = '';
        });
        this.socket.on('restart-vote-update', d => {
          document.getElementById('vote-status').textContent = `Votes: ${d.votes} / ${d.needed}`;
        });
        this.socket.on('game-restarting', () => {
          this.hasVoted = false; this.isReady = false;
          this.ammo = 30; this.points = 0; this.weapon = 'pistol';
          this.stopLoop();
          this.updateAmmo(30); this.updatePoints(0); this.updateWeapon('pistol');
          this.showLobby();
        });
      }

      bindJoinUI() {
        const input = document.getElementById('room-code-input');
        const btn   = document.getElementById('join-btn');
        btn.addEventListener('click', () => {
          const code = input.value.trim().toUpperCase();
          if (code.length !== 4) { this.showError('Enter a 4-character code'); return; }
          this.join(code);
        });
        input.addEventListener('keypress', e => { if (e.key === 'Enter') btn.click(); });
        input.addEventListener('input',    e => { e.target.value = e.target.value.toUpperCase(); });
      }

      join(roomCode) {
        this.roomCode = roomCode;
        localStorage.setItem('zs-room', roomCode);
        this.socket.emit('join-room', { roomCode, deviceFingerprint: this.fp });
      }

      onJoinSuccess(data) {
        this.slot  = data.slotNumber;
        this.color = data.color;
        localStorage.setItem('zs-fp', data.deviceFingerprint);
        this.enableRotateWarning();
        this.showLobby();
        this.setStatus('PLAYER ' + this.slot);
        this.requestWakeLock();
      }

      enableRotateWarning() {
        const check = () => {
          const isPortrait = window.innerHeight > window.innerWidth;
          document.getElementById('rotate-warning').style.display = isPortrait ? 'flex' : 'none';
        };
        window.addEventListener('orientationchange', check);
        window.addEventListener('resize', check);
        check();
      }

      showError(msg) {
        const el = document.getElementById('join-error');
        el.textContent = msg;
        setTimeout(() => { el.textContent = ''; }, 3000);
      }

      bindReadyBtn() {
        const btn = document.getElementById('ready-btn');
        btn.addEventListener('click', () => {
          if (this.isReady) return;
          this.isReady = true;
          btn.textContent = 'READY!';
          btn.classList.add('voted');
          document.getElementById('waiting-text').textContent = 'Waiting for others...';
          this.socket.emit('player-ready', { roomCode: this.roomCode });
        });
      }

      bindActionBtn() {
        const btn = document.getElementById('action-btn');
        btn.addEventListener('click', () => {
          if (btn.classList.contains('mode-box'))  { this.socket.emit('mystery-box-purchase', { roomCode: this.roomCode }); }
          else if (btn.classList.contains('mode-vend')) { this.socket.emit('vending-purchase', { roomCode: this.roomCode }); }
        });
      }

      updateActionButton(canUseMysteryBox, canUseVending, points, vendingCost) {
        this.canUseMysteryBox = canUseMysteryBox;
        this.canUseVending    = canUseVending;
        const btn = document.getElementById('action-btn');
        btn.classList.remove('mode-box', 'mode-vend', 'mode-broke');
        const MYSTERY_BOX_COST = 1500;

        if (canUseMysteryBox) {
          const canAfford = points >= MYSTERY_BOX_COST;
          btn.classList.add(canAfford ? 'mode-box' : 'mode-broke');
          btn.innerHTML = canAfford
            ? `MYSTERY<br>BOX<br>$${MYSTERY_BOX_COST}`
            : `MYSTERY<br>BOX<br><span style="color:#552222">NEED $${MYSTERY_BOX_COST-points}</span>`;
        } else if (canUseVending) {
          const cost = vendingCost || 500;
          const canAfford = points >= cost;
          btn.classList.add(canAfford ? 'mode-vend' : 'mode-broke');
          btn.innerHTML = canAfford
            ? `HEALTH<br>+25 HP<br>$${cost}`
            : `HEALTH<br>+25 HP<br><span style="color:#552222">NEED $${cost-points}</span>`;
        } else {
          btn.innerHTML = `—`;
        }
      }

      bindFireBtn() {
        const btn = document.getElementById('fire-btn');
        const press   = e => { e.preventDefault(); if (this.inMeleeMode) { this.meleeing = true; } else { this.firing = true; } btn.classList.add('active'); };
        const release = e => { e.preventDefault(); this.firing = false; this.meleeing = false; btn.classList.remove('active'); };
        btn.addEventListener('touchstart',  press,   { passive: false });
        btn.addEventListener('touchend',    release, { passive: false });
        btn.addEventListener('touchcancel', release, { passive: false });
        btn.addEventListener('mousedown',   press);
        btn.addEventListener('mouseup',     release);
        btn.addEventListener('mouseleave',  release);
      }

      setMeleeMode(active) {
        if (this.inMeleeMode === active) return;
        this.inMeleeMode = active;
        const btn    = document.getElementById('fire-btn');
        const banner = document.getElementById('melee-banner');
        const label  = btn.querySelector('.btn-label');
        if (active) {
          btn.classList.add('melee-mode'); label.textContent = 'KNIFE'; banner.style.display = 'block'; this.firing = false;
        } else {
          btn.classList.remove('melee-mode'); label.textContent = 'FIRE'; banner.style.display = 'none'; this.meleeing = false;
        }
      }

      startLoop() {
        this.stopLoop();
        this.loop = setInterval(() => {
          this.socket.emit('player-input', {
            roomCode: this.roomCode,
            input: { angle: this.joystick.getAngle(), fire: this.firing, melee: this.meleeing }
          });
        }, 50);
      }

      stopLoop() { if (this.loop) { clearInterval(this.loop); this.loop = null; } }

      showLobby() {
        document.getElementById('join-screen').style.display     = 'none';
        document.getElementById('ctrl-screen').style.display     = 'none';
        document.getElementById('gameover-screen').style.display = 'none';
        document.getElementById('lobby-screen').style.display    = 'flex';
        const badge = document.getElementById('player-badge');
        badge.textContent = 'PLAYER ' + this.slot;
        badge.style.color = this.color; badge.style.borderColor = this.color;
        badge.style.background = 'rgba(0,0,0,0.5)';
        const btn = document.getElementById('ready-btn');
        btn.textContent = 'READY UP'; btn.classList.remove('voted');
        document.getElementById('waiting-text').textContent = '';
        this.isReady = false;
      }

      showController() {
        document.getElementById('join-screen').style.display     = 'none';
        document.getElementById('lobby-screen').style.display    = 'none';
        document.getElementById('gameover-screen').style.display = 'none';
        document.getElementById('ctrl-screen').style.display     = 'flex';
      }

      showGameOver() {
        document.getElementById('ctrl-screen').style.display     = 'none';
        document.getElementById('gameover-screen').style.display = 'flex';
        const btn = document.getElementById('restart-btn');
        btn.textContent = 'RESTART'; btn.classList.remove('voted');
        document.getElementById('vote-status').textContent = '';
        this.hasVoted = false;
      }

      updateAmmo(ammo) {
        this.ammo = ammo;
        const el  = document.getElementById('ammo-display');
        if (ammo === -1) {
          el.innerHTML = `<span>AMMO </span>∞`;
          el.className = 'ammo-display';
          this.setMeleeMode(false);
        } else if (ammo === 0) {
          el.innerHTML = `<span>AMMO </span>OUT`;
          el.classList.remove('low'); el.classList.add('empty');
          this.setMeleeMode(true);
        } else {
          el.innerHTML = `<span>AMMO </span>${ammo}`;
          el.classList.remove('empty');
          ammo <= 5 ? el.classList.add('low') : el.classList.remove('low');
          this.setMeleeMode(false);
        }
      }

      updatePoints(points) {
        this.points = points;
        document.getElementById('points-display').innerHTML = `<span>$ </span>${points}`;
      }

      updateWeapon(weapon) {
        if (this.weapon !== weapon) this.showWeaponPopup(weapon);
        this.weapon = weapon;
        document.getElementById('weapon-display').innerHTML =
          `<span>WEAPON </span>${weapon.toUpperCase().replace('_',' ')}`;
      }

      showWeaponPopup(weapon) {
        document.getElementById('weapon-popup-name').textContent = weapon.toUpperCase().replace('_',' ');
        const popup = document.getElementById('weapon-popup');
        popup.style.display = 'block';
        setTimeout(() => { popup.style.display = 'none'; }, 2000);
      }

      bindRestartBtn() {
        const btn = document.getElementById('restart-btn');
        btn.addEventListener('click', () => {
          if (this.hasVoted) return;
          this.hasVoted = true;
          btn.textContent = 'VOTED!'; btn.classList.add('voted');
          document.getElementById('vote-status').textContent = 'Waiting for others...';
          this.socket.emit('restart-vote', { roomCode: this.roomCode });
        });
      }

      async requestWakeLock() {
        try {
          if ('wakeLock' in navigator) {
            await navigator.wakeLock.request('screen');
            document.addEventListener('visibilitychange', async () => {
              if (document.visibilityState === 'visible') {
                try { await navigator.wakeLock.request('screen'); } catch(_) {}
              }
            });
          }
        } catch(e) {}
      }

      setStatus(msg) { document.getElementById('status-bar').textContent = msg; }
    }

    const ctrl = new ControllerLink();
    document.body.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    history.pushState(null, null, location.href);
    window.addEventListener('popstate', () => history.pushState(null, null, location.href));

  </script>
</body>
</html>
