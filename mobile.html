<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Z-TEAM · Mobile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      width:100%; height:100%; overflow:hidden;
      background:#000; touch-action:none;
      font-family:'Press Start 2P',monospace;
    }

    /* ── LOBBY ── */
    #lobby-screen {
      position:fixed; inset:0; background:#000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:24px; z-index:100;
    }
    #lobby-title { font-size:clamp(28px,8vw,56px); color:#883232; letter-spacing:10px;
      text-shadow:3px 3px 0 #3d0000,-1px -1px 0 #5a1a1a; }
    #lobby-sub { color:#7869c4; font-size:8px; letter-spacing:3px; }

    #join-form { display:flex; flex-direction:column; align-items:center; gap:12px; }
    #room-input {
      background:#000; border:2px solid #7869c4; color:#fff;
      font-family:'Press Start 2P'; font-size:28px; letter-spacing:10px;
      text-align:center; padding:10px 16px; width:220px;
      text-transform:uppercase; outline:none;
    }
    #room-input:focus { border-color:#fff; }
    #btn-join {
      width:220px; height:48px; background:transparent; color:#fff;
      border:2px solid #fff; font-family:'Press Start 2P'; font-size:10px;
      letter-spacing:2px; cursor:pointer;
    }
    #btn-join:active { background:#883232; border-color:#883232; }
    #join-err { color:#883232; font-size:7px; min-height:14px; letter-spacing:1px; }

    /* ── WAITING ── */
    #waiting-screen {
      position:fixed; inset:0; background:#000;
      display:none; flex-direction:column; align-items:center; justify-content:center;
      gap:20px; z-index:100;
    }
    #waiting-title { color:#7869c4; font-size:10px; letter-spacing:3px; }
    #room-code-disp { color:#fff; font-size:40px; letter-spacing:12px; }
    #player-slots { display:flex; gap:10px; }
    .pslot {
      width:90px; height:60px; border:2px solid #1a1a3a;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    }
    .pslot.me { border-color:#7869c4; }
    .pslot.occupied { border-color:#40318d; }
    .pslot-num { font-size:6px; color:#333355; letter-spacing:1px; }
    .pslot-name { font-size:8px; letter-spacing:1px; }
    .pslot-ready { font-size:6px; color:#333355; }
    .pslot-ready.yes { color:#55a049; }
    #btn-ready {
      width:220px; height:48px; background:transparent; color:#55a049;
      border:2px solid #55a049; font-family:'Press Start 2P'; font-size:10px;
      letter-spacing:3px; cursor:pointer;
    }
    #btn-ready:active { background:rgba(85,160,73,0.2); }
    #btn-ready.ready { color:#40318d; border-color:#40318d; }
    #wait-status { color:#333355; font-size:7px; letter-spacing:2px; }
    #countdown-disp { color:#883232; font-size:44px; letter-spacing:6px; display:none; }

    /* ── GAME VIEW ── */
    #game-wrap {
      display:none; position:fixed; inset:0;
      align-items:center; justify-content:center;
      background:#000;
    }
    #game-canvas {
      display:block;
      image-rendering:pixelated;
      image-rendering:crisp-edges;
      touch-action:none;
    }

    /* ── TRANSPARENT OVERLAY CONTROLS ── */
    #controls-overlay {
      position:fixed; inset:0;
      pointer-events:none;
      z-index:50;
    }

    /* Joystick — bottom left */
    #joystick-zone {
      position:absolute;
      bottom:24px; left:24px;
      width:120px; height:120px;
      border:2px solid rgba(120,105,196,0.35);
      background:rgba(0,0,20,0.25);
      pointer-events:all;
      touch-action:none;
    }
    #joystick-zone::before, #joystick-zone::after {
      content:''; position:absolute; background:rgba(64,49,141,0.25);
    }
    #joystick-zone::before { width:1px; height:100%; top:0; left:50%; }
    #joystick-zone::after  { height:1px; width:100%; left:0; top:50%; }
    #joystick-knob {
      width:44px; height:44px;
      background:rgba(120,105,196,0.6);
      border:1px solid rgba(120,105,196,0.8);
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      pointer-events:none;
    }

    /* Fire button — bottom right */
    #fire-btn {
      position:absolute;
      bottom:24px; right:24px;
      width:100px; height:100px;
      background:rgba(136,50,50,0.18);
      border:2px solid rgba(136,50,50,0.5);
      color:rgba(136,50,50,0.8);
      font-family:'Press Start 2P'; font-size:10px; letter-spacing:1px;
      display:flex; align-items:center; justify-content:center;
      pointer-events:all; touch-action:none; user-select:none;
    }
    #fire-btn.active { background:rgba(136,50,50,0.55); border-color:#883232; color:#fff; }
    #fire-btn.knife { background:rgba(85,160,73,0.18); border-color:rgba(85,160,73,0.5); color:rgba(85,160,73,0.8); }
    #fire-btn.knife.active { background:rgba(85,160,73,0.5); color:#fff; }

    /* Action button — bottom center, only visible when in range */
    #action-btn {
      position:absolute;
      bottom:30px; left:50%; transform:translateX(-50%);
      width:80px; height:80px;
      background:rgba(0,0,20,0.3);
      border:2px solid rgba(61,12,105,0.6);
      color:rgba(139,63,150,0.7);
      font-family:'Press Start 2P'; font-size:7px; letter-spacing:1px;
      line-height:1.5; text-align:center;
      display:none; align-items:center; justify-content:center; flex-direction:column;
      pointer-events:all; touch-action:none;
    }
    #action-btn.box { display:flex; border-color:rgba(139,63,150,0.8); color:#d14da0; }
    #action-btn.vend { display:flex; border-color:rgba(85,160,73,0.8); color:#55a049; }
    #action-btn:active { background:rgba(30,0,50,0.6); }

    /* Mini HUD — top bar */
    #mini-hud {
      position:absolute; top:8px; left:0; right:0;
      display:flex; justify-content:space-between; align-items:center;
      padding:0 12px; pointer-events:none;
    }
    .hud-item { display:flex; flex-direction:column; align-items:center; }
    .hud-lbl { font-size:5px; color:rgba(64,49,141,0.8); letter-spacing:1px; }
    .hud-val { font-size:9px; color:rgba(255,255,255,0.9); letter-spacing:1px; }
    #hp-bar-wrap { width:80px; }
    #hp-bar-track { height:3px; background:rgba(20,0,0,0.6); margin-top:2px; }
    #hp-bar-fill  { height:3px; background:#55a049; width:100%; transition:width 0.1s; }

    /* Mic status */
    #mic-btn {
      position:absolute; top:8px; right:12px;
      font-size:6px; color:rgba(64,49,141,0.7); letter-spacing:1px;
      background:rgba(0,0,10,0.4); border:1px solid rgba(64,49,141,0.4);
      padding:4px 8px; pointer-events:all; cursor:pointer;
    }
    #mic-btn.active { color:#55a049; border-color:#55a049; }
    #mic-btn.denied { color:#883232; border-color:#883232; }

    /* Wave banner */
    #wave-banner {
      position:absolute; top:40%; left:50%; transform:translateX(-50%);
      font-size:clamp(14px,4vw,24px); color:#883232; letter-spacing:3px;
      display:none; pointer-events:none; text-align:center; white-space:nowrap;
    }

    /* ── GAME OVER ── */
    #gameover-screen {
      position:fixed; inset:0; background:rgba(0,0,0,0.9);
      display:none; flex-direction:column; align-items:center; justify-content:center;
      gap:18px; z-index:90;
    }
    #gameover-screen h1 { font-size:clamp(20px,6vw,36px); color:#883232; letter-spacing:6px;
      text-shadow:2px 2px 0 #3d0000; }
    #gameover-screen p { font-size:7px; color:#40318d; letter-spacing:2px; }
    #btn-restart {
      width:220px; height:48px; background:transparent; color:#fff;
      border:2px solid #fff; font-family:'Press Start 2P'; font-size:10px;
      letter-spacing:2px; cursor:pointer;
    }
    #btn-restart:active { background:#883232; border-color:#883232; }
    #vote-disp { font-size:7px; color:#55a049; letter-spacing:1px; }
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby-screen">
  <div id="lobby-title">Z-TEAM</div>
  <div id="lobby-sub">MOBILE PLAYER</div>
  <div id="join-form">
    <input id="room-input" type="text" maxlength="4" placeholder="CODE" autocomplete="off" spellcheck="false">
    <button id="btn-join" onclick="joinRoom()">JOIN GAME</button>
    <div id="join-err"></div>
  </div>
</div>

<!-- WAITING -->
<div id="waiting-screen">
  <div id="waiting-title">WAITING ROOM</div>
  <div id="room-code-disp">----</div>
  <div id="player-slots">
    <div class="pslot" id="pslot-1"><div class="pslot-num">P1</div><div class="pslot-name" style="color:#00ffff">—</div><div class="pslot-ready">—</div></div>
    <div class="pslot" id="pslot-2"><div class="pslot-num">P2</div><div class="pslot-name" style="color:#ff44ff">—</div><div class="pslot-ready">—</div></div>
    <div class="pslot" id="pslot-3"><div class="pslot-num">P3</div><div class="pslot-name" style="color:#4488ff">—</div><div class="pslot-ready">—</div></div>
    <div class="pslot" id="pslot-4"><div class="pslot-num">P4</div><div class="pslot-name" style="color:#ffff00">—</div><div class="pslot-ready">—</div></div>
  </div>
  <div id="countdown-disp">3</div>
  <button id="btn-ready" onclick="toggleReady()">READY UP</button>
  <div id="wait-status">WAITING FOR PLAYERS...</div>
</div>

<!-- GAME -->
<div id="game-wrap">
  <canvas id="game-canvas"></canvas>
  <div id="controls-overlay">
    <div id="mini-hud">
      <div class="hud-item">
        <div class="hud-lbl">WAVE</div>
        <div class="hud-val" id="hud-wave">1</div>
      </div>
      <div class="hud-item" id="hp-bar-wrap">
        <div class="hud-lbl">HP</div>
        <div class="hud-val" id="hud-hp">100</div>
        <div id="hp-bar-track"><div id="hp-bar-fill"></div></div>
      </div>
      <div class="hud-item">
        <div class="hud-lbl">WEAPON</div>
        <div class="hud-val" id="hud-weapon">PISTOL</div>
      </div>
      <div class="hud-item">
        <div class="hud-lbl">AMMO</div>
        <div class="hud-val" id="hud-ammo">30</div>
      </div>
      <div class="hud-item">
        <div class="hud-lbl">$</div>
        <div class="hud-val" id="hud-pts">0</div>
      </div>
    </div>
    <button id="mic-btn" onclick="toggleMute()">🎤 MIC</button>
    <div id="joystick-zone"><div id="joystick-knob"></div></div>
    <div id="fire-btn">FIRE</div>
    <div id="action-btn" onclick="handleAction()">—</div>
    <div id="wave-banner"></div>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameover-screen">
  <h1>GAME OVER</h1>
  <p>ALL PLAYERS HAVE FALLEN</p>
  <button id="btn-restart" onclick="voteRestart()">VOTE RESTART</button>
  <div id="vote-disp"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/shared/game-constants.js"></script>
<script>
'use strict';

const {
  CANVAS_W, CANVAS_H, WALL,
  PLAYER_SIZE, PLAYER_COLORS, PLAYER_SPAWNS,
  MELEE_RANGE, MELEE_ARC,
  MYSTERY_BOX_COST, BOX_USE_RANGE,
  VENDING_BASE_COST, VENDING_USE_RANGE,
  BOSS_CONFIGS, WEAPONS,
} = GAME_CONSTANTS;

// ── State ─────────────────────────────────────────────────────────
let socket, roomCode, mySlot, myColor;
let isReady = false;
let gameState = null;
let myMuted = false;
let meleeFlashes = [];
let bannerTimeout = null;

// Mobile speed — match local PLAYER_SPEED feel
const MOBILE_SPEED = 3.2;

// Client prediction
let localMe = null;

// Smoothing
const smooth = {};

function getSmoothPos(key, sx, sy, svx, svy) {
  if (!smooth[key]) { smooth[key] = {x:sx,y:sy,vx:svx||0,vy:svy||0}; return smooth[key]; }
  const s = smooth[key];
  const LERP = 0.15; // gentler glide — reduces teleport feel
  s.vx = svx || (sx - s.x) * 0.2;
  s.vy = svy || (sy - s.y) * 0.2;
  s.x += (sx - s.x) * LERP;
  s.y += (sy - s.y) * LERP;
  return s;
}

// ── Canvas ────────────────────────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('game-wrap');
  if (wrap.style.display === 'none') return;
  const scale = Math.min(window.innerWidth / CANVAS_W, window.innerHeight / CANVAS_H);
  canvas.width  = CANVAS_W;
  canvas.height = CANVAS_H;
  canvas.style.width  = Math.floor(CANVAS_W * scale) + 'px';
  canvas.style.height = Math.floor(CANVAS_H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 150));

// ── Joystick ──────────────────────────────────────────────────────
const jZone = document.getElementById('joystick-zone');
const jKnob = document.getElementById('joystick-knob');
let jTouch = null;
let joystick = { x: 0, y: 0, active: false };

jZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  jTouch = t.identifier;
  updateJoystick(t);
}, { passive: false });

jZone.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === jTouch) { updateJoystick(t); break; }
  }
}, { passive: false });

jZone.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === jTouch) {
      jTouch = null;
      joystick = { x: 0, y: 0, active: false };
      jKnob.style.transform = 'translate(-50%,-50%)';
      break;
    }
  }
});

function updateJoystick(touch) {
  const rect = jZone.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;
  const dx = touch.clientX - cx;
  const dy = touch.clientY - cy;
  const maxR = rect.width / 2 - 4;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const clamp = Math.min(dist, maxR);
  const nx = dist > 0 ? dx / dist : 0;
  const ny = dist > 0 ? dy / dist : 0;
  joystick = { x: nx, y: ny, active: dist > 8 };
  jKnob.style.transform = `translate(calc(-50% + ${nx*clamp}px), calc(-50% + ${ny*clamp}px))`;
}

// ── Fire button ───────────────────────────────────────────────────
const fireBtn = document.getElementById('fire-btn');
let fireTouch = null;
let isFiring = false;

fireBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  fireTouch = e.changedTouches[0].identifier;
  isFiring = true;
  fireBtn.classList.add('active');
}, { passive: false });

fireBtn.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === fireTouch) {
      fireTouch = null; isFiring = false;
      fireBtn.classList.remove('active');
      break;
    }
  }
});

// Long-press fire for melee when no ammo
fireBtn.addEventListener('touchstart', e => {
  if (!localMe || localMe.ammo !== 0) return;
  // Send melee on tap when out of ammo
  socket.emit('mobile-melee', { roomCode });
  if (localMe) meleeFlashes.push({ x: localMe.x, y: localMe.y, angle: localMe.angle || 0, color: myColor, timer: 8 });
}, { passive: true });

// ── Input loop ────────────────────────────────────────────────────
let inputInterval = null;
let lastAimAngle = 0;

function startInputLoop() {
  inputInterval = setInterval(() => {
    if (!localMe || !localMe.alive) return;
    let vx = 0, vy = 0;
    if (joystick.active) { vx = joystick.x; vy = joystick.y; }
    // Aim toward movement direction (auto-aim from joystick direction)
    if (joystick.active) lastAimAngle = Math.atan2(vy, vx);
    socket.emit('mobile-input', {
      roomCode,
      input: {
        moveX: vx, moveY: vy,
        aimAngle: lastAimAngle,
        fire: isFiring && localMe.ammo !== 0,
        angle: (vx||vy) ? Math.atan2(vy,vx) : null
      }
    });
    // Local prediction
    if (vx || vy) {
      const hs = PLAYER_SIZE/2 + WALL;
      localMe.x = Math.max(hs, Math.min(CANVAS_W-hs, localMe.x + vx * MOBILE_SPEED));
      localMe.y = Math.max(hs, Math.min(CANVAS_H-hs, localMe.y + vy * MOBILE_SPEED));
      localMe.angle = Math.atan2(vy, vx);
    }
  }, 33); // 30hz
}

// ── Action button ─────────────────────────────────────────────────
function handleAction() {
  const me = getMyPlayer();
  if (!me) return;
  if (me.canUseMysteryBox) socket.emit('mystery-box-purchase', { roomCode });
  else if (me.canUseVending) socket.emit('vending-purchase', { roomCode });
}

function updateActionBtn() {
  const me = getMyPlayer();
  const btn = document.getElementById('action-btn');
  if (!me) { btn.className = ''; btn.style.display='none'; return; }
  if (me.canUseMysteryBox) {
    btn.className = 'box';
    btn.innerHTML = `BOX<br>$${MYSTERY_BOX_COST}`;
  } else if (me.canUseVending) {
    btn.className = 'vend';
    btn.innerHTML = `HP<br>$${me.vendingCost||500}`;
  } else {
    btn.className = '';
    btn.style.display = 'none';
  }
}

function getMyPlayer() {
  if (localMe) return localMe;
  if (!gameState || !mySlot) return null;
  return gameState.players.find(p => p.slot === mySlot);
}

// ── HUD ───────────────────────────────────────────────────────────
const _hud = {};
function updateHUD() {
  const me = getMyPlayer();
  if (!me || !gameState) return;
  const hp     = Math.max(0, Math.ceil(me.hp||0));
  const wave   = gameState.wave || 1;
  const weapon = (me.weapon||'pistol').toUpperCase();
  const ammo   = me.ammo === -1 ? '∞' : (me.ammo||0);
  const pts    = me.points||0;
  const pct    = Math.max(0, Math.min(100, (hp/(me.maxHp||100))*100));
  const hpCol  = pct>50?'#55a049':pct>25?'#bfce72':'#883232';

  if (_hud.hp!==hp)     { document.getElementById('hud-hp').textContent=hp; _hud.hp=hp; }
  if (_hud.wave!==wave) { document.getElementById('hud-wave').textContent=wave; _hud.wave=wave; }
  if (_hud.weapon!==weapon){ document.getElementById('hud-weapon').textContent=weapon; _hud.weapon=weapon; }
  if (_hud.ammo!==ammo) { document.getElementById('hud-ammo').textContent=ammo; _hud.ammo=ammo; }
  if (_hud.pts!==pts)   { document.getElementById('hud-pts').textContent=pts; _hud.pts=pts; }
  if (_hud.pct!==pct)   { document.getElementById('hp-bar-fill').style.width=pct+'%'; document.getElementById('hp-bar-fill').style.background=hpCol; _hud.pct=pct; }

  // Knife mode
  const isKnife = me.ammo === 0 || me.ammo === '0';
  fireBtn.classList.toggle('knife', !!isKnife);
  if (isKnife) fireBtn.textContent='KNIFE'; else fireBtn.textContent='FIRE';

  updateActionBtn();
}

// ── Wave banner ───────────────────────────────────────────────────
function showBanner(text, color='#883232') {
  const el = document.getElementById('wave-banner');
  el.textContent = text; el.style.color = color;
  el.style.display = 'block';
  if (bannerTimeout) clearTimeout(bannerTimeout);
  bannerTimeout = setTimeout(() => { el.style.display='none'; }, 3000);
}

// ── Lobby & ready ─────────────────────────────────────────────────
function joinRoom() {
  const code = document.getElementById('room-input').value.trim().toUpperCase();
  if (code.length !== 4) { document.getElementById('join-err').textContent='ENTER 4-LETTER CODE'; return; }
  socket.emit('join-room', { roomCode: code, deviceFingerprint: getFingerprint(), mode: 'mobile' });
}

function toggleReady() {
  isReady = !isReady;
  const btn = document.getElementById('btn-ready');
  btn.textContent = isReady ? 'CANCEL' : 'READY UP';
  btn.classList.toggle('ready', isReady);
  socket.emit('player-ready', { roomCode });
}

function voteRestart() { socket.emit('restart-vote-remote', { roomCode }); }

function getFingerprint() {
  const k = 'zt_fp';
  let fp = localStorage.getItem(k);
  if (!fp) { fp = Math.random().toString(36).slice(2); localStorage.setItem(k, fp); }
  return fp;
}

function updateLobbySlots(players) {
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById(`pslot-${i}`);
    if (!el) continue;
    const p = players.find(p => p.slotNumber === i);
    el.className = 'pslot' + (i===mySlot?' me':'') + (p?' occupied':'');
    const rdEl = el.querySelector('.pslot-ready');
    if (p && p.ready) rdEl.textContent='READY'; else rdEl.textContent='—';
    rdEl.classList.toggle('yes', !!(p&&p.ready));
  }
}

// ── Display state ─────────────────────────────────────────────────
function getDisplayState() {
  if (!gameState) return null;
  const players = gameState.players.map(p => {
    if (p.slot === mySlot && localMe) return { ...p, x:localMe.x, y:localMe.y, hp:localMe.hp, maxHp:localMe.maxHp, ammo:localMe.ammo, weapon:localMe.weapon, points:localMe.points, alive:localMe.alive };
    if (!p.connected) return p;
    const s = smooth['p'+p.slot];
    return s ? {...p, x:s.x, y:s.y} : p;
  });
  const zombies = gameState.zombies.map((z,i) => {
    const key = 'z'+(z.id!==undefined?z.id:i);
    const s = smooth[key];
    return s ? {...z, x:s.x, y:s.y} : z;
  });
  return { ...gameState, players, zombies };
}

// ── RENDER ────────────────────────────────────────────────────────
const PC_PLAYER_SIZE = 28;
const PC_AMMO_SIZE   = 20;
const PC_BOX_SIZE    = 50;

function renderGame() {
  // Tick smoothing
  if (gameState) {
    for (const p of gameState.players) {
      if (!p.connected || p.slot===mySlot) continue;
      const s = smooth['p'+p.slot]; if (s) { s.x+=s.vx; s.y+=s.vy; }
    }
    for (let i=0; i<gameState.zombies.length; i++) {
      const z=gameState.zombies[i];
      const key='z'+(z.id!==undefined?z.id:i);
      const s=smooth[key]; if (s) { s.x+=s.vx; s.y+=s.vy; }
    }
  }

  updateHUD();
  const gs = getDisplayState();
  const W = CANVAS_W, H = CANVAS_H;
  const hs = PC_PLAYER_SIZE / 2;

  // Background + grid
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(80,80,160,0.18)'; ctx.lineWidth = 1;
  for (let x=0; x<W; x+=16) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<H; y+=16) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  if (!gs) {
    ctx.strokeStyle='#7869c4'; ctx.lineWidth=4; ctx.strokeRect(2,2,W-4,H-4);
    ctx.fillStyle='#40318d'; ctx.font='7px "Press Start 2P",monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('CONNECTING...', W/2, H/2);
    return;
  }

  // Mystery box
  if (gs.mysteryBox) {
    const bhs=PC_BOX_SIZE/2, bx=gs.mysteryBox.x, by=gs.mysteryBox.y;
    ctx.fillStyle='#3d0c69'; ctx.fillRect(bx-bhs,by-bhs,PC_BOX_SIZE,PC_BOX_SIZE);
    ctx.fillStyle='#6a1a9a';
    for(let px=bx-bhs;px<bx+bhs;px+=4) for(let py=by-bhs;py<by+bhs;py+=4) ctx.fillRect(px,py,2,2);
    ctx.strokeStyle='#d14da0'; ctx.lineWidth=2; ctx.strokeRect(bx-bhs+1,by-bhs+1,PC_BOX_SIZE-2,PC_BOX_SIZE-2);
    ctx.fillStyle='#ffffff'; ctx.font='bold 22px "Press Start 2P",monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('?',bx,by);
  }

  // Vending machine
  if (gs.vendingMachine) {
    const v=gs.vendingMachine;
    ctx.fillStyle='#003300'; ctx.fillRect(v.x-28,v.y-36,56,72);
    ctx.fillStyle='#004400';
    for(let px=v.x-28;px<v.x+28;px+=4) for(let py=v.y-36;py<v.y+36;py+=4) ctx.fillRect(px,py,2,2);
    ctx.strokeStyle='#55a049'; ctx.lineWidth=2; ctx.strokeRect(v.x-27,v.y-35,54,70);
    ctx.fillStyle='#55a049'; ctx.fillRect(v.x-3,v.y-18,6,18); ctx.fillRect(v.x-10,v.y-10,20,6);
    ctx.fillStyle='#94e089'; ctx.font='6px "Press Start 2P",monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('$'+(gs.vendingCost||500),v.x,v.y+18);
    ctx.fillStyle='#55a049'; ctx.fillText('+HP',v.x,v.y+28);
  }

  // Ammo packs
  for (let a of gs.ammoPacks||[]) {
    ctx.fillStyle='#bfce72'; ctx.fillRect(a.x-PC_AMMO_SIZE/2,a.y-PC_AMMO_SIZE/2,PC_AMMO_SIZE,PC_AMMO_SIZE);
    ctx.strokeStyle='#574200'; ctx.lineWidth=2; ctx.strokeRect(a.x-PC_AMMO_SIZE/2+1,a.y-PC_AMMO_SIZE/2+1,PC_AMMO_SIZE-2,PC_AMMO_SIZE-2);
    ctx.fillStyle='#000'; ctx.font='bold 8px "Press Start 2P",monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('A',a.x,a.y);
  }

  // Health packs
  for (let h of gs.healthPacks||[]) {
    ctx.fillStyle='#883232'; ctx.fillRect(h.x-10,h.y-10,20,20);
    ctx.strokeStyle='#b86962'; ctx.lineWidth=2; ctx.strokeRect(h.x-9,h.y-9,18,18);
    ctx.fillStyle='#ffffff'; ctx.fillRect(h.x-6,h.y-2,12,4); ctx.fillRect(h.x-2,h.y-6,4,12);
  }

  // Zombies
  for (let z of gs.zombies||[]) {
    const zhs=z.size/2,zx=z.x-zhs,zy=z.y-zhs;
    if (z.type==='bomber') {
      ctx.fillStyle='#40318d'; ctx.fillRect(zx,zy,z.size,z.size);
      ctx.fillStyle='#7869c4';
      for(let px=zx;px<zx+z.size;px+=4) for(let py=zy;py<zy+z.size;py+=4) ctx.fillRect(px,py,2,2);
      ctx.strokeStyle='#6fcfcf'; ctx.lineWidth=2; ctx.strokeRect(zx+1,zy+1,z.size-2,z.size-2);
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(zx+3,zy+3); ctx.lineTo(zx+z.size-3,zy+z.size-3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(zx+z.size-3,zy+3); ctx.lineTo(zx+3,zy+z.size-3); ctx.stroke();
    } else {
      ctx.fillStyle=z.color; ctx.fillRect(zx,zy,z.size,z.size);
      ctx.strokeStyle=z.borderColor; ctx.lineWidth=2; ctx.strokeRect(zx+1,zy+1,z.size-2,z.size-2);
    }
    const hpPct=z.hp/z.maxHp;
    ctx.fillStyle='#1a0000'; ctx.fillRect(z.x-zhs,zy-7,z.size,4);
    ctx.fillStyle=hpPct>0.5?'#55a049':hpPct>0.25?'#bfce72':'#883232';
    ctx.fillRect(z.x-zhs,zy-7,Math.floor(z.size*hpPct),4);
  }

  // Bullets
  for (let b of gs.bullets||[]) {
    ctx.save();
    switch(b.weapon) {
      case 'shotgun': ctx.fillStyle='#bfce72'; ctx.fillRect(b.x-2,b.y-2,4,4); break;
      case 'smg': { const a=Math.atan2(b.vy,b.vx); ctx.fillStyle='#c8a800'; ctx.translate(b.x,b.y); ctx.rotate(a); ctx.fillRect(-5,-1,10,2); break; }
      case 'lmg': { const a=Math.atan2(b.vy,b.vx); ctx.fillStyle='#8b5429'; ctx.translate(b.x,b.y); ctx.rotate(a); ctx.fillRect(-7,-2,14,4); break; }
      case 'ar':  { const a=Math.atan2(b.vy,b.vx); ctx.fillStyle='#55a049'; ctx.translate(b.x,b.y); ctx.rotate(a); ctx.fillRect(-6,-1,12,3); break; }
      case 'minigun': ctx.fillStyle='#d14da0'; ctx.fillRect(b.x-2,b.y-2,4,4); break;
      case 'raygun': ctx.fillStyle='#6fcfcf'; ctx.fillRect(b.x-4,b.y-4,8,8); ctx.strokeStyle='#ffffff'; ctx.lineWidth=1; ctx.strokeRect(b.x-4,b.y-4,8,8); break;
      case 'thundergun': ctx.fillStyle='#883232'; ctx.fillRect(b.x-5,b.y-5,10,10); ctx.fillStyle='#ffffff'; ctx.fillRect(b.x-2,b.y-2,4,4); break;
      case 'plasma': ctx.fillStyle='#8b3f96'; ctx.fillRect(b.x-4,b.y-4,8,8); ctx.fillStyle='#d14da0'; ctx.fillRect(b.x-2,b.y-2,4,4); break;
      default: ctx.fillStyle=b.color||'#ffffff'; ctx.fillRect(b.x-2,b.y-2,4,4);
    }
    ctx.restore();
  }

  // Boss
  if (gs.boss && !gs.boss.dead) renderBoss(gs.boss);

  // Melee stabs
  for (let i=meleeFlashes.length-1; i>=0; i--) {
    const f=meleeFlashes[i];
    const progress=1-f.timer/8;
    const stabLen=progress<0.5?MELEE_RANGE*(progress/0.5):MELEE_RANGE*(1-(progress-0.5)/0.5);
    const ex=f.x+Math.cos(f.angle)*stabLen, ey=f.y+Math.sin(f.angle)*stabLen;
    ctx.save(); ctx.strokeStyle=f.color; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(f.x,f.y); ctx.lineTo(ex,ey); ctx.stroke();
    ctx.fillStyle='#ffffff'; ctx.fillRect(ex-3,ey-3,6,6);
    ctx.restore();
    f.timer--; if(f.timer<=0) meleeFlashes.splice(i,1);
  }

  // Border
  ctx.strokeStyle='#7869c4'; ctx.lineWidth=4; ctx.strokeRect(2,2,W-4,H-4);
  ctx.strokeStyle='#40318d'; ctx.lineWidth=1; ctx.strokeRect(6,6,W-12,H-12);

  // Players
  for (let p of gs.players||[]) {
    if (!p.connected) continue;
    const isMe = p.slot===mySlot;
    if (p.alive) {
      ctx.fillStyle=p.color; ctx.fillRect(p.x-hs,p.y-hs,PC_PLAYER_SIZE,PC_PLAYER_SIZE);
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
      ctx.strokeRect(p.x-hs+1,p.y-hs+1,PC_PLAYER_SIZE-2,PC_PLAYER_SIZE-2);
      const aimA = isMe ? (localMe?localMe.angle:p.angle) : p.angle;
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+Math.cos(aimA)*(hs+10),p.y+Math.sin(aimA)*(hs+10)); ctx.stroke();
      const hpPct=(p.hp||0)/(p.maxHp||100);
      ctx.fillStyle='#1a0000'; ctx.fillRect(p.x-hs,p.y-hs-8,PC_PLAYER_SIZE,4);
      ctx.fillStyle=hpPct>0.5?'#55a049':hpPct>0.25?'#bfce72':'#883232';
      ctx.fillRect(p.x-hs,p.y-hs-8,PC_PLAYER_SIZE*hpPct,4);
      ctx.fillStyle='#bfce72'; ctx.font='6px "Press Start 2P",monospace';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('$'+(p.points||0),p.x,p.y-hs-18);
      // Highlight my player with a subtle extra ring
      if (isMe) { ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1; ctx.strokeRect(p.x-hs-2,p.y-hs-2,PC_PLAYER_SIZE+4,PC_PLAYER_SIZE+4); }
    } else {
      ctx.fillStyle='#1a1a2a'; ctx.fillRect(p.x-hs,p.y-hs,PC_PLAYER_SIZE,PC_PLAYER_SIZE);
      ctx.strokeStyle='#505050'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
      ctx.strokeRect(p.x-hs+1,p.y-hs+1,PC_PLAYER_SIZE-2,PC_PLAYER_SIZE-2); ctx.setLineDash([]);
    }
    ctx.fillStyle='#ffffff'; ctx.font='bold 10px "Press Start 2P",monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('P'+p.slot,p.x,p.y);
  }
}

// ── BOSS RENDER — identical to pc.html ───────────────────────────
function renderBoss(b) {
  const flashing = b.flashTimer > 0 && b.flashTimer % 2 === 0;
  for (let bb of b.bossBullets||[]) {
    ctx.fillStyle=flashing?'#ffffff':bb.color; ctx.fillRect(bb.x-4,bb.y-4,8,8);
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=1; ctx.strokeRect(bb.x-4,bb.y-4,8,8);
  }
  if (b.type==='triangle') {
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.rotation);
    ctx.fillStyle=flashing?'#ffffff':'#3d0c69';
    ctx.beginPath();
    for(let i=0;i<3;i++){const a=-Math.PI/2+(i*2*Math.PI/3);i===0?ctx.moveTo(Math.cos(a)*b.radius,Math.sin(a)*b.radius):ctx.lineTo(Math.cos(a)*b.radius,Math.sin(a)*b.radius);}
    ctx.closePath(); ctx.fill();
    if(!flashing){ctx.fillStyle='#6a1a9a';ctx.save();ctx.clip();for(let px=-b.radius;px<b.radius;px+=4)for(let py=-b.radius;py<b.radius;py+=4)ctx.fillRect(px,py,2,2);ctx.restore();}
    ctx.strokeStyle='#ffffff';ctx.lineWidth=2;
    ctx.beginPath();for(let i=0;i<3;i++){const a=-Math.PI/2+(i*2*Math.PI/3);i===0?ctx.moveTo(Math.cos(a)*b.radius,Math.sin(a)*b.radius):ctx.lineTo(Math.cos(a)*b.radius,Math.sin(a)*b.radius);}
    ctx.closePath();ctx.stroke();ctx.restore();
    const tA=[b.rotation-Math.PI/2,b.rotation-Math.PI/2+(2*Math.PI/3),b.rotation-Math.PI/2+(4*Math.PI/3)];
    for(let t=0;t<3;t++){if(!b.tips||b.tips[t].hp<=0)continue;const tx=b.x+Math.cos(tA[t])*b.radius,ty=b.y+Math.sin(tA[t])*b.radius;const sz=14+Math.floor((b.tips[t].hp/b.tips[t].maxHp)*8);ctx.fillStyle=flashing?'#fff':'#883232';ctx.fillRect(tx-sz/2,ty-sz/2,sz,sz);ctx.strokeStyle='#b86962';ctx.lineWidth=2;ctx.strokeRect(tx-sz/2+1,ty-sz/2+1,sz-2,sz-2);ctx.fillStyle='#1a0000';ctx.fillRect(tx-sz,ty+sz/2+3,sz*2,4);ctx.fillStyle='#883232';ctx.fillRect(tx-sz,ty+sz/2+3,sz*2*(b.tips[t].hp/b.tips[t].maxHp),4);}
  } else if (b.type==='octagon') {
    ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.rotation);ctx.fillStyle=flashing?'#fff':'#7a3b00';
    ctx.beginPath();for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;i===0?ctx.moveTo(Math.cos(a)*b.radius,Math.sin(a)*b.radius):ctx.lineTo(Math.cos(a)*b.radius,Math.sin(a)*b.radius);}ctx.closePath();ctx.fill();
    if(!flashing){ctx.fillStyle='#8b5429';ctx.save();ctx.clip();for(let px=-b.radius;px<b.radius;px+=4)for(let py=-b.radius;py<b.radius;py+=4)ctx.fillRect(px,py,2,2);ctx.restore();}
    ctx.strokeStyle='#c8a800';ctx.lineWidth=3;ctx.beginPath();for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;i===0?ctx.moveTo(Math.cos(a)*b.radius,Math.sin(a)*b.radius):ctx.lineTo(Math.cos(a)*b.radius,Math.sin(a)*b.radius);}ctx.closePath();ctx.stroke();ctx.restore();
    for(let i=0;i<8;i++){if(!b.corners||b.corners[i].hp<=0)continue;const a=b.rotation+(i/8)*Math.PI*2;const cx=b.x+Math.cos(a)*(b.radius-10),cy=b.y+Math.sin(a)*(b.radius-10);const sz=12+Math.floor((b.corners[i].hp/b.corners[i].maxHp)*6);ctx.fillStyle=flashing?'#fff':'#c8a800';ctx.fillRect(cx-sz/2,cy-sz/2,sz,sz);ctx.strokeStyle='#ffffff';ctx.lineWidth=1;ctx.strokeRect(cx-sz/2+1,cy-sz/2+1,sz-2,sz-2);}
  } else if (b.type==='pentagon') {
    ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.rotation||0);
    for(let i=0;i<5;i++){const panel=b.panels?b.panels[i]:null;if(panel&&(panel.state==='dead'||panel.state==='flying'))continue;const aS=(i/5)*Math.PI*2-Math.PI/2,aE=((i+1)/5)*Math.PI*2-Math.PI/2,gap=0.18;const hp_r=panel?(panel.hp/panel.maxHp):1;ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,b.radius,aS+gap,aE-gap);ctx.closePath();ctx.fillStyle=flashing?'#fff':'#40318d';ctx.fill();if(!flashing){ctx.fillStyle=`rgba(120,105,196,${0.4+0.4*hp_r})`;ctx.save();ctx.clip();for(let px=-b.radius;px<b.radius;px+=4)for(let py=-b.radius;py<b.radius;py+=4)ctx.fillRect(px,py,2,2);ctx.restore();}ctx.strokeStyle='#7869c4';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,b.radius,aS+gap,aE-gap);ctx.closePath();ctx.stroke();const mA=(aS+aE)/2+gap;const px=Math.cos(mA)*b.radius*0.7,py=Math.sin(mA)*b.radius*0.7;const sz=10+Math.floor(hp_r*8);ctx.fillStyle=flashing?'#fff':'#6fcfcf';ctx.fillRect(px-sz/2,py-sz/2,sz,sz);}
    ctx.beginPath();ctx.arc(0,0,30,0,Math.PI*2);ctx.fillStyle=b.rage?(flashing?'#fff':'#6fcfcf'):(flashing?'#fff':'#40318d');ctx.fill();
    if(b.rage){const hp_r=b.coreHp/b.coreMaxHp;ctx.restore();ctx.fillStyle='#001133';ctx.fillRect(b.x-30,b.y+38,60,5);ctx.fillStyle='#7869c4';ctx.fillRect(b.x-30,b.y+38,60*hp_r,5);}else{ctx.restore();}
    if(b.boomerang&&b.activePanel>=0){const bm=b.boomerang;ctx.save();ctx.translate(bm.x,bm.y);ctx.rotate(bm.t*Math.PI*4);ctx.beginPath();ctx.arc(0,0,28,-Math.PI/4,Math.PI/4);ctx.lineTo(0,0);ctx.closePath();ctx.fillStyle=flashing?'#fff':'#40318d';ctx.fill();ctx.strokeStyle='#7869c4';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#ffffff';ctx.fillRect(-4,-4,8,8);ctx.restore();}
  } else if (b.type==='diamond') {
    if(!b.split){ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.rotation);const hp_r=b.coreHp/b.coreMaxHp;ctx.beginPath();ctx.moveTo(0,-b.radius);ctx.lineTo(b.radius*0.6,0);ctx.lineTo(0,b.radius);ctx.lineTo(-b.radius*0.6,0);ctx.closePath();ctx.fillStyle=flashing?'#fff':'#8b3f96';ctx.fill();if(!flashing){ctx.fillStyle='#d14da0';ctx.save();ctx.clip();for(let px=-b.radius;px<b.radius;px+=4)for(let py=-b.radius;py<b.radius;py+=4)ctx.fillRect(px,py,2,2);ctx.restore();}ctx.strokeStyle='#d14da0';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,-b.radius);ctx.lineTo(b.radius*0.6,0);ctx.lineTo(0,b.radius);ctx.lineTo(-b.radius*0.6,0);ctx.closePath();ctx.stroke();ctx.fillStyle='#1a0000';ctx.fillRect(-28,-5,56,10);ctx.fillStyle=flashing?'#fff':'#d14da0';ctx.fillRect(-28,-5,56*hp_r,10);ctx.restore();}
    else{for(let s of b.shards||[]){if(!s.alive)continue;ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.rotation);ctx.beginPath();ctx.moveTo(0,-s.radius);ctx.lineTo(s.radius*0.6,0);ctx.lineTo(0,s.radius);ctx.lineTo(-s.radius*0.6,0);ctx.closePath();ctx.fillStyle=flashing?'#fff':'#8b3f96';ctx.fill();ctx.strokeStyle='#d14da0';ctx.lineWidth=2;ctx.stroke();const bw=s.radius*1.2;ctx.fillStyle='#1a0000';ctx.fillRect(-bw/2,s.radius+4,bw,4);ctx.fillStyle='#d14da0';ctx.fillRect(-bw/2,s.radius+4,bw*(s.hp/s.maxHp),4);ctx.restore();}}
  } else if (b.type==='spiral') {
    ctx.save();ctx.translate(b.x,b.y);
    for(let i=0;i<5;i++){const arm=b.arms[i];if(arm.hp<=0)continue;const rg=arm.regrowing>0;if(arm.regrowing>0)arm.regrowing--;const aA=b.rotation+(i/5)*Math.PI*2,ext=b.radius+60+Math.sin(b.breathe+i)*30,hp_r=arm.hp/arm.maxHp;const aC=rg?'#883232':flashing?'#fff':'#55a049';ctx.save();ctx.strokeStyle=aC;ctx.lineWidth=5;ctx.beginPath();const mA=aA+0.4,mx=Math.cos(mA)*ext*0.6,my=Math.sin(mA)*ext*0.6;ctx.moveTo(0,0);ctx.quadraticCurveTo(mx,my,Math.cos(aA)*ext,Math.sin(aA)*ext);ctx.stroke();ctx.restore();const tX=Math.cos(aA)*ext,tY=Math.sin(aA)*ext,tsz=12+Math.floor(hp_r*6);ctx.fillStyle=rg?'#883232':flashing?'#fff':'#94e089';ctx.fillRect(tX-tsz/2,tY-tsz/2,tsz,tsz);ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(tX-tsz/2+1,tY-tsz/2+1,tsz-2,tsz-2);ctx.fillStyle='#003311';ctx.fillRect(tX-20,tY+tsz/2+3,40,4);ctx.fillStyle='#55a049';ctx.fillRect(tX-20,tY+tsz/2+3,40*hp_r,4);}
    ctx.fillStyle=flashing?'#fff':'#55a049';ctx.fillRect(-14,-14,28,28);ctx.strokeStyle='#94e089';ctx.lineWidth=2;ctx.strokeRect(-13,-13,26,26);ctx.restore();
  } else if (b.type==='fractal') {
    for(let piece of b.pieces||[]){if(!piece.alive)continue;ctx.save();ctx.translate(piece.x,piece.y);ctx.rotate(piece.rotation);const hp_r=piece.hp/piece.maxHp;ctx.fillStyle=flashing?'#fff':'#574200';ctx.beginPath();for(let i=0;i<3;i++){const a=-Math.PI/2+(i*2*Math.PI/3);i===0?ctx.moveTo(Math.cos(a)*piece.radius,Math.sin(a)*piece.radius):ctx.lineTo(Math.cos(a)*piece.radius,Math.sin(a)*piece.radius);}ctx.closePath();ctx.fill();if(!flashing){ctx.fillStyle='#c8a800';ctx.save();ctx.clip();for(let px=-piece.radius;px<piece.radius;px+=4)for(let py=-piece.radius;py<piece.radius;py+=4)ctx.fillRect(px,py,2,2);ctx.restore();}ctx.strokeStyle='#c8a800';ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<3;i++){const a=-Math.PI/2+(i*2*Math.PI/3);i===0?ctx.moveTo(Math.cos(a)*piece.radius,Math.sin(a)*piece.radius):ctx.lineTo(Math.cos(a)*piece.radius,Math.sin(a)*piece.radius);}ctx.closePath();ctx.stroke();const bw=piece.radius*1.4;ctx.fillStyle='#1a0a00';ctx.fillRect(-bw/2,piece.radius+4,bw,4);ctx.fillStyle='#c8a800';ctx.fillRect(-bw/2,piece.radius+4,bw*hp_r,4);ctx.restore();}
  } else if (b.type==='octopus') {
    for(let i=0;i<(b.tentacles||[]).length;i++){const t=b.tentacles[i];const bA=b.rotation+(i/b.tentacles.length)*Math.PI*2;const bX=b.x+Math.cos(bA)*b.radius,bY=b.y+Math.sin(bA)*b.radius;if(!t.alive){ctx.save();ctx.strokeStyle='#330033';ctx.lineWidth=3;ctx.globalAlpha=0.35;ctx.setLineDash([3,4]);ctx.beginPath();ctx.moveTo(bX,bY);ctx.lineTo(bX+Math.cos(bA)*18,bY+Math.sin(bA)*18);ctx.stroke();ctx.setLineDash([]);ctx.restore();continue;}const hp_r=t.hp/t.maxHp,isAct=t.state!=='idle';const tC=flashing?'#fff':isAct?'#d14da0':'#8b3f96';const mX=bX+(t.tipX-bX)*0.5+Math.cos(bA+Math.PI/2)*30,mY=bY+(t.tipY-bY)*0.5+Math.sin(bA+Math.PI/2)*30;ctx.save();if(!isAct)ctx.setLineDash([6,3]);ctx.strokeStyle=tC;ctx.lineWidth=isAct?6:4;ctx.beginPath();ctx.moveTo(bX,bY);ctx.quadraticCurveTo(mX,mY,t.tipX,t.tipY);ctx.stroke();ctx.setLineDash([]);const tsz=10+Math.floor(hp_r*6);ctx.fillStyle=isAct?'#d14da0':tC;ctx.fillRect(t.tipX-tsz/2,t.tipY-tsz/2,tsz,tsz);ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(t.tipX-tsz/2+1,t.tipY-tsz/2+1,tsz-2,tsz-2);ctx.fillStyle='#1a0010';ctx.fillRect(t.tipX-14,t.tipY+tsz/2+2,28,4);ctx.fillStyle='#d14da0';ctx.fillRect(t.tipX-14,t.tipY+tsz/2+2,28*hp_r,4);ctx.restore();}
    const bsz=b.radius*2;ctx.fillStyle=flashing?'#fff':'#3d0c69';ctx.fillRect(b.x-b.radius,b.y-b.radius,bsz,bsz);ctx.fillStyle='#6a1a9a';for(let px=b.x-b.radius;px<b.x+b.radius;px+=4)for(let py=b.y-b.radius;py<b.y+b.radius;py+=4)ctx.fillRect(px,py,2,2);ctx.strokeStyle='#d14da0';ctx.lineWidth=3;ctx.strokeRect(b.x-b.radius+1,b.y-b.radius+1,bsz-2,bsz-2);ctx.strokeStyle='#8b3f96';ctx.lineWidth=4;ctx.beginPath();ctx.arc(b.x,b.y,b.radius*0.45,0,Math.PI*2);ctx.stroke();const at=(b.tentacles||[]).filter(t=>t.alive).length;ctx.fillStyle='#d14da0';ctx.font='7px "Press Start 2P",monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(`${at}/8`,b.x,b.y+b.radius*0.55);
  } else if (b.type==='snake') {
    const hp_r=b.hp/b.maxHp;for(let si=(b.segs||[]).length-1;si>=1;si--){const s=b.segs[si],segR=18*(0.62+0.38*(1-si/b.segs.length));ctx.fillStyle=flashing?'#fff':'#003300';ctx.fillRect(s.x-segR,s.y-segR,segR*2,segR*2);ctx.strokeStyle='#55a049';ctx.lineWidth=1;ctx.strokeRect(s.x-segR+1,s.y-segR+1,segR*2-2,segR*2-2);}
    if(b.segs&&b.segs[0]){const head=b.segs[0],headR=18;ctx.fillStyle=flashing?'#fff':'#55a049';ctx.fillRect(head.x-headR,head.y-headR,headR*2,headR*2);ctx.strokeStyle='#94e089';ctx.lineWidth=2;ctx.strokeRect(head.x-headR+1,head.y-headR+1,headR*2-2,headR*2-2);[b.angle-0.55,b.angle+0.55].forEach(ea=>{const ex=head.x+Math.cos(ea)*headR*0.55,ey=head.y+Math.sin(ea)*headR*0.55;ctx.fillStyle='#bfce72';ctx.fillRect(ex-3,ey-3,6,6);ctx.fillStyle='#000';ctx.fillRect(ex-1,ey-1,3,3);});ctx.fillStyle='#001a00';ctx.fillRect(head.x-32,head.y-headR-14,64,6);ctx.fillStyle='#55a049';ctx.fillRect(head.x-32,head.y-headR-14,64*hp_r,6);}
  }
  ctx.fillStyle='#d14da0';ctx.font='7px "Press Start 2P",monospace';ctx.textAlign='center';ctx.textBaseline='middle';if(!b.dropping)ctx.fillText(b.label||'BOSS',b.x,b.y-(b.radius||80)-22);
}

// ── Voice chat ────────────────────────────────────────────────────
let localStream = null;
let rtcPeers = {};
let audioCtx = null;
let analyserNodes = {};
let speakingState = {};

async function initVoiceChat() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const btn = document.getElementById('mic-btn');
    btn.textContent = '🎤 ON'; btn.classList.add('active');
    setupVoiceAnalyser(mySlot, localStream);
  } catch(e) {
    const btn = document.getElementById('mic-btn');
    btn.textContent = '🚫 MIC'; btn.classList.add('denied');
  }
}

function toggleMute() {
  myMuted = !myMuted;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !myMuted);
  const btn = document.getElementById('mic-btn');
  btn.textContent = myMuted ? '🔇 OFF' : '🎤 ON';
  btn.className = myMuted ? 'denied' : 'active';
}

function getOrCreatePeer(remoteSlot) {
  if (rtcPeers[remoteSlot]) return rtcPeers[remoteSlot];
  const pc = new RTCPeerConnection({ iceServers: [{ urls:'stun:stun.l.google.com:19302' },{ urls:'stun:stun1.l.google.com:19302' }] });
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.onicecandidate = e => { if (e.candidate) socket.emit('rtc-ice', { roomCode, to:remoteSlot, from:mySlot, candidate:e.candidate }); };
  pc.ontrack = e => { const a=new Audio(); a.srcObject=e.streams[0]; a.play().catch(()=>{}); setupVoiceAnalyser(remoteSlot, e.streams[0]); };
  rtcPeers[remoteSlot] = pc;
  return pc;
}

async function initiateCall(remoteSlot) {
  const pc = getOrCreatePeer(remoteSlot);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit('rtc-offer', { roomCode, to:remoteSlot, from:mySlot, offer });
}

function setupVoiceAnalyser(slot, stream) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    const an  = audioCtx.createAnalyser(); an.fftSize=512;
    src.connect(an); analyserNodes[slot] = an;
  } catch(e) {}
}

// ── Socket ────────────────────────────────────────────────────────
socket = io({ transports: ['websocket'] });

socket.on('connect', () => {
  const urlRoom = new URLSearchParams(window.location.search).get('room');
  if (urlRoom) {
    document.getElementById('room-input').value = urlRoom.toUpperCase();
    joinRoom();
  }
});

socket.on('join-success', d => {
  roomCode = d.roomCode; mySlot = d.slotNumber; myColor = PLAYER_COLORS[mySlot-1];
  document.getElementById('lobby-screen').style.display = 'none';
  document.getElementById('waiting-screen').style.display = 'flex';
  document.getElementById('room-code-disp').textContent = roomCode;
  document.getElementById(`pslot-${mySlot}`).classList.add('me');
  initVoiceChat();
});

socket.on('join-failed', d => {
  document.getElementById('join-err').textContent = d.reason || 'JOIN FAILED';
});

socket.on('lobby-update', d => updateLobbySlots(d.players));

socket.on('ready-countdown', d => {
  const el = document.getElementById('countdown-disp');
  el.style.display = 'block'; el.textContent = d.seconds;
});

socket.on('ready-countdown-cancelled', () => {
  document.getElementById('countdown-disp').style.display = 'none';
});

socket.on('game-starting-remote', () => {
  document.getElementById('waiting-screen').style.display = 'none';
  const wrap = document.getElementById('game-wrap');
  wrap.style.display = 'flex';
  resizeCanvas();
  startInputLoop();
});

socket.on('remote-game-state', state => {
  const prev = gameState;
  gameState = state;

  // Sync localMe from server
  const me = state.players.find(p => p.slot === mySlot);
  if (me) {
    if (!localMe) {
      localMe = { ...me };
    } else {
      // Reconcile: server is authoritative for everything except position during prediction
      const dx = me.x - localMe.x, dy = me.y - localMe.y;
      if (Math.sqrt(dx*dx+dy*dy) > 160) { localMe.x=me.x; localMe.y=me.y; } // hard snap if too far off
      localMe.hp=me.hp; localMe.maxHp=me.maxHp; localMe.ammo=me.ammo===(-1)?Infinity:me.ammo;
      localMe.weapon=me.weapon; localMe.points=me.points; localMe.alive=me.alive;
      localMe.canUseMysteryBox=me.canUseMysteryBox; localMe.canUseVending=me.canUseVending;
      localMe.vendingCost=me.vendingCost;
    }
  }

  // Smooth other players
  for (const p of state.players) {
    if (p.slot===mySlot||!p.connected) continue;
    getSmoothPos('p'+p.slot, p.x, p.y, p.vx||0, p.vy||0);
  }
  // Smooth zombies
  for (let i=0; i<state.zombies.length; i++) {
    const z=state.zombies[i];
    const key='z'+(z.id!==undefined?z.id:i);
    getSmoothPos(key, z.x, z.y, 0, 0);
  }

  if (state.gameOver && document.getElementById('gameover-screen').style.display==='none') {
    document.getElementById('gameover-screen').style.display='flex';
  }
});

socket.on('wave-start', d => showBanner(d.type==='boss'?`⚠ BOSS WAVE ${d.wave}`:`WAVE ${d.wave}`, d.type==='boss'?'#ff6600':'#883232'));
socket.on('restart-vote-update', d => { document.getElementById('vote-disp').textContent=`VOTES: ${d.votes}/${d.needed}`; });
socket.on('game-restarting-remote', () => {
  document.getElementById('gameover-screen').style.display='none';
  gameState=null; localMe=null; meleeFlashes=[];
  for(const k of Object.keys(smooth))delete smooth[k];
});

socket.on('rtc-initiate', async d => {
  if (d.offerer===mySlot) await initiateCall(d.answerer);
});
socket.on('rtc-offer', async d => {
  const pc=getOrCreatePeer(d.from);
  await pc.setRemoteDescription(d.offer);
  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit('rtc-answer',{roomCode,to:d.from,from:mySlot,answer});
});
socket.on('rtc-answer', async d => {
  const pc=rtcPeers[d.from]; if(pc)await pc.setRemoteDescription(d.answer);
});
socket.on('rtc-ice', async d => {
  const pc=rtcPeers[d.from]; if(pc)try{await pc.addIceCandidate(d.candidate);}catch(e){}
});

// ── Render loop ───────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  if (document.getElementById('game-wrap').style.display !== 'none') renderGame();
}
requestAnimationFrame(loop);
</script>
