<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Z-TEAM · Mobile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body {
      width:100%; height:100%; overflow:hidden;
      background:#000; touch-action:none;
      font-family:'Press Start 2P',monospace;
    }

    /* ── LOBBY ── */
    #lobby-screen {
      position:fixed; inset:0; background:#000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:20px; z-index:100;
    }
    #lobby-title { font-size:clamp(24px,7vw,48px); color:#883232; letter-spacing:8px;
      text-shadow:3px 3px 0 #3d0000,-1px -1px 0 #5a1a1a; }
    #lobby-sub { color:#7869c4; font-size:8px; letter-spacing:3px; }
    #join-form { display:flex; flex-direction:column; align-items:center; gap:12px; }
    #btn-create {
      width:220px; height:48px; background:transparent; color:#fff;
      border:2px solid #fff; font-family:'Press Start 2P'; font-size:10px;
      letter-spacing:2px; cursor:pointer;
    }
    #btn-create:active { background:#883232; border-color:#883232; }
    #divider { color:#333355; font-size:7px; letter-spacing:3px; }
    #room-input {
      background:#000; border:2px solid #7869c4; color:#fff;
      font-family:'Press Start 2P'; font-size:24px; letter-spacing:8px;
      text-align:center; padding:10px 16px; width:220px;
      text-transform:uppercase; outline:none;
    }
    #room-input:focus { border-color:#fff; }
    #btn-join {
      width:220px; height:48px; background:transparent; color:#fff;
      border:2px solid #7869c4; font-family:'Press Start 2P'; font-size:10px;
      letter-spacing:2px; cursor:pointer;
    }
    #btn-join:active { background:#883232; border-color:#883232; }
    #join-err { color:#883232; font-size:7px; min-height:14px; letter-spacing:1px; }

    /* ── WAITING ── */
    #waiting-screen {
      position:fixed; inset:0; background:#000;
      display:none; flex-direction:column; align-items:center; justify-content:center;
      gap:16px; z-index:100;
    }
    #waiting-title { color:#7869c4; font-size:9px; letter-spacing:3px; }
    #room-code-disp { color:#fff; font-size:36px; letter-spacing:10px; }
    #room-code-hint { color:#40318d; font-size:6px; letter-spacing:2px; }
    #player-slots { display:flex; gap:8px; }
    .pslot {
      width:76px; height:52px; border:2px solid #1a1a3a;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    }
    .pslot.me { border-color:#7869c4; }
    .pslot.occupied { border-color:#40318d; }
    .pslot-num { font-size:6px; color:#333355; }
    .pslot-name { font-size:7px; }
    .pslot-ready { font-size:6px; color:#333355; }
    .pslot-ready.yes { color:#55a049; }
    #btn-ready {
      width:200px; height:44px; background:transparent; color:#55a049;
      border:2px solid #55a049; font-family:'Press Start 2P'; font-size:9px;
      letter-spacing:2px; cursor:pointer;
    }
    #btn-ready:active { background:rgba(85,160,73,0.2); }
    #btn-ready.ready { color:#40318d; border-color:#40318d; }
    #wait-status { color:#333355; font-size:6px; letter-spacing:2px; }
    #countdown-disp { color:#883232; font-size:40px; letter-spacing:6px; display:none; }

    /* ── ROTATE WARNING — blocks portrait on ALL screens ── */
    #rotate-warn {
      display:none;
      position:fixed; inset:0; background:#000;
      flex-direction:column; align-items:center; justify-content:center;
      gap:20px; z-index:9999;
      color:#7869c4; font-size:9px; letter-spacing:3px; text-align:center;
    }
    #rotate-warn.visible { display:flex; }
    #rotate-arrow { font-size:56px; display:inline-block; animation:rotateit 2s ease-in-out infinite; }
    @keyframes rotateit {
      0%   { transform:rotate(0deg); }
      40%  { transform:rotate(-90deg); }
      60%  { transform:rotate(-90deg); }
      100% { transform:rotate(-90deg) translateX(0); }
    }

    /* ── GAME WRAP — fills entire screen ── */
    #game-wrap {
      display:none;
      position:fixed; inset:0;
      background:#000;
    }
    #game-canvas {
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      image-rendering:pixelated;
      image-rendering:crisp-edges;
      touch-action:none;
    }

    /* ── OVERLAY — sits on top of canvas, same fixed inset ── */
    #controls-overlay {
      display:none;
      position:fixed; inset:0;
      z-index:50;
      pointer-events:none; /* overlay itself passes touches through */
    }

    /* Only these elements receive touches */
    #joystick-zone, #fire-btn, #action-btn, #mic-btn {
      pointer-events:all;
    }

    /* Mini HUD */
    #mini-hud {
      position:absolute; top:6px; left:0; right:0;
      display:flex; justify-content:space-around; align-items:center;
      padding:0 8px; pointer-events:none;
      background:rgba(0,0,0,0.3);
      border-bottom:1px solid rgba(64,49,141,0.3);
      padding-bottom:4px;
    }
    .hud-item { display:flex; flex-direction:column; align-items:center; }
    .hud-lbl { font-size:5px; color:rgba(120,105,196,0.8); letter-spacing:1px; }
    .hud-val { font-size:9px; color:#fff; letter-spacing:1px; }
    #hp-bar-wrap { width:70px; }
    #hp-bar-track { height:3px; background:rgba(20,0,0,0.8); margin-top:2px; }
    #hp-bar-fill  { height:3px; background:#55a049; width:100%; }

    /* Mic button — top right */
    #mic-btn {
      position:absolute; top:6px; right:8px;
      display:flex; align-items:center; gap:5px;
      font-size:6px; color:#40318d; letter-spacing:1px;
      background:rgba(0,0,10,0.6); border:1px solid #333355;
      padding:4px 8px; pointer-events:all; cursor:pointer;
      font-family:'Press Start 2P',monospace; z-index:10;
    }
    #mic-dot {
      width:8px; height:8px; border-radius:50%;
      background:#333355; flex-shrink:0; transition:all 0.15s;
    }
    #mic-btn.active { color:#55a049; border-color:#55a049; }
    #mic-btn.active #mic-dot { background:#55a049; box-shadow:0 0 6px #55a049,0 0 12px #55a049; }
    #mic-btn.speaking #mic-dot { background:#94e089; box-shadow:0 0 10px #94e089,0 0 20px #55a049; }
    #mic-btn.denied { color:#883232; border-color:#883232; }
    #mic-btn.denied #mic-dot { background:#883232; }

    /* Joystick zone — bottom left, large circular touch target */
    #joystick-zone {
      position:absolute;
      bottom:20px; left:20px;
      width:150px; height:150px;
      border:2px solid rgba(120,105,196,0.5);
      background:rgba(0,0,20,0.25);
      border-radius:50%;
      pointer-events:all; touch-action:none;
    }
    #joystick-zone::before, #joystick-zone::after {
      content:''; position:absolute; background:rgba(64,49,141,0.25);
    }
    #joystick-zone::before { width:1px; height:100%; top:0; left:50%; }
    #joystick-zone::after  { height:1px; width:100%; left:0; top:50%; }
    #joystick-knob {
      width:54px; height:54px;
      background:rgba(120,105,196,0.55);
      border:2px solid rgba(120,105,196,0.85);
      border-radius:50%;
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      pointer-events:none;
    }

    /* Fire button — bottom right, circular */
    #fire-btn {
      position:absolute;
      bottom:20px; right:20px;
      width:130px; height:130px;
      background:rgba(136,50,50,0.2);
      border:2px solid rgba(136,50,50,0.6);
      border-radius:50%;
      color:rgba(200,80,80,0.9);
      font-family:'Press Start 2P'; font-size:11px; letter-spacing:1px;
      display:flex; align-items:center; justify-content:center;
      pointer-events:all; touch-action:none; user-select:none;
    }
    #fire-btn.active { background:rgba(136,50,50,0.55); border-color:#cc4444; color:#fff; }
    #fire-btn.knife  { background:rgba(85,160,73,0.2); border-color:rgba(85,160,73,0.6); color:rgba(120,200,100,0.9); }
    #fire-btn.knife.active { background:rgba(85,160,73,0.55); color:#fff; }

    /* Action button — center bottom, circular */
    #action-btn {
      position:absolute;
      bottom:30px; left:50%; transform:translateX(-50%);
      width:90px; height:90px;
      border-radius:50%;
      background:rgba(0,0,20,0.3);
      border:2px solid rgba(61,12,105,0.7);
      color:rgba(209,77,160,0.8);
      font-family:'Press Start 2P'; font-size:7px; letter-spacing:1px;
      line-height:1.6; text-align:center;
      display:none; align-items:center; justify-content:center; flex-direction:column;
      pointer-events:all; touch-action:none;
    }
    #action-btn.box  { display:flex; border-color:rgba(209,77,160,0.8); color:#d14da0; }
    #action-btn.vend { display:flex; border-color:rgba(85,160,73,0.8); color:#55a049; }
    #action-btn:active { background:rgba(40,0,60,0.6); }

    /* Wave banner */
    #wave-banner {
      position:absolute; top:38%; left:50%; transform:translateX(-50%);
      font-size:clamp(14px,4vw,22px); color:#883232; letter-spacing:3px;
      display:none; pointer-events:none; text-align:center; white-space:nowrap;
    }

    /* ── GAME OVER ── */
    #gameover-screen {
      position:fixed; inset:0; background:rgba(0,0,0,0.92);
      display:none; flex-direction:column; align-items:center; justify-content:center;
      gap:16px; z-index:200;
    }
    #gameover-screen h1 { font-size:clamp(18px,5vw,32px); color:#883232; letter-spacing:5px; }
    #gameover-screen p  { font-size:7px; color:#40318d; letter-spacing:2px; }
    #btn-restart {
      width:200px; height:44px; background:transparent; color:#fff;
      border:2px solid #fff; font-family:'Press Start 2P'; font-size:9px;
      letter-spacing:2px; cursor:pointer;
    }
    #btn-restart:active { background:#883232; border-color:#883232; }
    #vote-disp { font-size:7px; color:#55a049; letter-spacing:1px; }
  </style>
</head>
<body>

<!-- ROTATE WARNING -->
<div id="rotate-warn">
  <div id="rotate-arrow">↻</div>
  <div>ROTATE YOUR PHONE</div>
  <div style="font-size:6px;color:#40318d;margin-top:4px;letter-spacing:2px;">LANDSCAPE MODE FOR BEST PLAY</div>
</div>

<!-- LOBBY -->
<div id="lobby-screen">
  <div id="lobby-title">Z-TEAM</div>
  <div id="lobby-sub">ONLINE MULTIPLAYER</div>
  <div id="join-form">
    <button id="btn-create" onclick="createRoom()">CREATE ROOM</button>
    <div id="divider">— OR —</div>
    <input id="room-input" type="text" maxlength="4" placeholder="CODE" autocomplete="off" spellcheck="false" inputmode="text">
    <button id="btn-join" onclick="joinRoom()">JOIN ROOM</button>
    <div id="join-err"></div>
  </div>
</div>

<!-- WAITING -->
<div id="waiting-screen">
  <div id="waiting-title">WAITING ROOM</div>
  <div id="room-code-disp">----</div>
  <div id="room-code-hint">SHARE THIS CODE WITH FRIENDS</div>
  <div id="player-slots">
    <div class="pslot" id="pslot-1"><div class="pslot-num">P1</div><div class="pslot-name" style="color:#00ffff">—</div><div class="pslot-ready">—</div></div>
    <div class="pslot" id="pslot-2"><div class="pslot-num">P2</div><div class="pslot-name" style="color:#ff44ff">—</div><div class="pslot-ready">—</div></div>
    <div class="pslot" id="pslot-3"><div class="pslot-num">P3</div><div class="pslot-name" style="color:#4488ff">—</div><div class="pslot-ready">—</div></div>
    <div class="pslot" id="pslot-4"><div class="pslot-num">P4</div><div class="pslot-name" style="color:#ffff00">—</div><div class="pslot-ready">—</div></div>
  </div>
  <div id="countdown-disp">3</div>
  <button id="btn-ready" onclick="toggleReady()">READY UP</button>
  <div id="wait-status">WAITING FOR PLAYERS...</div>
</div>

<!-- GAME -->
<div id="game-wrap">
  <canvas id="game-canvas"></canvas>
</div>

<!-- OVERLAY — separate from game-wrap -->
<div id="controls-overlay">
  <div id="mini-hud">
    <div class="hud-item"><div class="hud-lbl">WAVE</div><div class="hud-val" id="hud-wave">1</div></div>
    <div class="hud-item" id="hp-bar-wrap">
      <div class="hud-lbl">HP</div>
      <div class="hud-val" id="hud-hp">100</div>
      <div id="hp-bar-track"><div id="hp-bar-fill"></div></div>
    </div>
    <div class="hud-item"><div class="hud-lbl">WEAPON</div><div class="hud-val" id="hud-weapon">PISTOL</div></div>
    <div class="hud-item"><div class="hud-lbl">AMMO</div><div class="hud-val" id="hud-ammo">30</div></div>
    <div class="hud-item"><div class="hud-lbl">$</div><div class="hud-val" id="hud-pts">0</div></div>
  </div>
  <button id="mic-btn" onclick="toggleMute()"><div id="mic-dot"></div><span id="mic-label">MIC</span></button>
  <div id="joystick-zone"><div id="joystick-knob"></div></div>
  <div id="fire-btn">FIRE</div>
  <div id="action-btn" onclick="handleAction()">—</div>
  <div id="wave-banner"></div>
</div>

<!-- GAME OVER -->
<div id="gameover-screen">
  <h1>GAME OVER</h1>
  <p>ALL PLAYERS HAVE FALLEN</p>
  <button id="btn-restart" onclick="voteRestart()">VOTE RESTART</button>
  <div id="vote-disp"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/shared/game-constants.js"></script>
<script>
'use strict';

const {
  CANVAS_W, CANVAS_H, WALL,
  PLAYER_SIZE, PLAYER_COLORS, PLAYER_SPAWNS,
  MELEE_RANGE, MELEE_ARC,
  MYSTERY_BOX_COST, BOX_USE_RANGE,
  VENDING_BASE_COST, VENDING_USE_RANGE,
  BOSS_CONFIGS, WEAPONS,
} = GAME_CONSTANTS;

let socket, roomCode, mySlot, myColor;
let isReady = false;
let gameState = null;
let myMuted = false;
let meleeFlashes = [];
let bannerTimeout = null;

const MOBILE_SPEED = 2.5;
let localMe = null;
const smooth = {};

function getSmoothPos(key, sx, sy, svx, svy) {
  if (!smooth[key]) { smooth[key]={x:sx,y:sy,vx:svx||0,vy:svy||0}; return smooth[key]; }
  const s=smooth[key];
  s.vx=svx||(sx-s.x)*0.2; s.vy=svy||(sy-s.y)*0.2;
  s.x+=(sx-s.x)*0.15; s.y+=(sy-s.y)*0.15;
  return s;
}

// ── Canvas ────────────────────────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const W = window.innerWidth, H = window.innerHeight;
  const scale = Math.min(W / CANVAS_W, H / CANVAS_H);
  canvas.width  = CANVAS_W;
  canvas.height = CANVAS_H;
  canvas.style.width  = Math.floor(CANVAS_W * scale) + 'px';
  canvas.style.height = Math.floor(CANVAS_H * scale) + 'px';
}

// ── Joystick ──────────────────────────────────────────────────────
const jZone = document.getElementById('joystick-zone');
const jKnob = document.getElementById('joystick-knob');
let jTouch = null;
let joystick = { x:0, y:0, active:false };

jZone.addEventListener('touchstart', e => {
  e.preventDefault();
  jTouch = e.changedTouches[0].identifier;
  updateJoystick(e.changedTouches[0]);
}, {passive:false});
jZone.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) if (t.identifier===jTouch) { updateJoystick(t); break; }
}, {passive:false});
jZone.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier===jTouch) {
      jTouch=null; joystick={x:0,y:0,active:false};
      jKnob.style.transform='translate(-50%,-50%)'; break;
    }
  }
});
jZone.addEventListener('touchcancel', () => {
  jTouch=null; joystick={x:0,y:0,active:false};
  jKnob.style.transform='translate(-50%,-50%)';
});

function updateJoystick(touch) {
  const r=jZone.getBoundingClientRect();
  const dx=touch.clientX-(r.left+r.width/2), dy=touch.clientY-(r.top+r.height/2);
  const maxR=r.width/2-6, dist=Math.sqrt(dx*dx+dy*dy);
  const clamp=Math.min(dist,maxR);
  const nx=dist>0?dx/dist:0, ny=dist>0?dy/dist:0;
  joystick={x:nx,y:ny,active:dist>10};
  jKnob.style.transform=`translate(calc(-50% + ${nx*clamp}px),calc(-50% + ${ny*clamp}px))`;
}

// ── Fire button ───────────────────────────────────────────────────
const fireBtn = document.getElementById('fire-btn');
let fireTouch=null, isFiring=false;

fireBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  fireTouch=e.changedTouches[0].identifier;
  isFiring=true; fireBtn.classList.add('active');
  // Melee when out of ammo
  if (localMe && (localMe.ammo===0||localMe.ammo==='0')) {
    socket.emit('mobile-melee',{roomCode});
    meleeFlashes.push({x:localMe.x,y:localMe.y,angle:localMe.angle||0,color:myColor,timer:8});
  }
}, {passive:false});
fireBtn.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier===fireTouch) { fireTouch=null; isFiring=false; fireBtn.classList.remove('active'); break; }
  }
});
fireBtn.addEventListener('touchcancel', () => { fireTouch=null; isFiring=false; fireBtn.classList.remove('active'); });

// ── Input loop ────────────────────────────────────────────────────
let inputInterval=null, lastAimAngle=0;

function startInputLoop() {
  if (inputInterval) clearInterval(inputInterval);
  inputInterval = setInterval(() => {
    if (!localMe||!localMe.alive) return;
    let vx=0,vy=0;
    if (joystick.active) { vx=joystick.x; vy=joystick.y; }
    if (joystick.active) lastAimAngle=Math.atan2(vy,vx);
    socket.emit('mobile-input',{roomCode,input:{
      moveX:vx,moveY:vy,aimAngle:lastAimAngle,
      fire:isFiring&&(localMe.ammo!==0&&localMe.ammo!=='0'),
      angle:(vx||vy)?Math.atan2(vy,vx):null
    }});
    if (vx||vy) {
      const hs=PLAYER_SIZE/2+WALL;
      localMe.x=Math.max(hs,Math.min(CANVAS_W-hs,localMe.x+vx*MOBILE_SPEED));
      localMe.y=Math.max(hs,Math.min(CANVAS_H-hs,localMe.y+vy*MOBILE_SPEED));
      localMe.angle=Math.atan2(vy,vx);
    }
  }, 33);
}

// ── Action button ─────────────────────────────────────────────────
function handleAction() {
  const me=getMyPlayer(); if (!me) return;
  if (me.canUseMysteryBox) socket.emit('mystery-box-purchase',{roomCode});
  else if (me.canUseVending) socket.emit('vending-purchase',{roomCode});
}

function updateActionBtn() {
  const me=getMyPlayer();
  const btn=document.getElementById('action-btn');
  if (!me||!me.alive) { btn.style.display='none'; btn.className=''; return; }
  if (me.canUseMysteryBox) { btn.className='box'; btn.innerHTML=`BOX<br>$${MYSTERY_BOX_COST}`; }
  else if (me.canUseVending) { btn.className='vend'; btn.innerHTML=`HP<br>$${me.vendingCost||500}`; }
  else { btn.className=''; btn.style.display='none'; }
}

function getMyPlayer() {
  if (localMe) return localMe;
  if (!gameState||!mySlot) return null;
  return gameState.players.find(p=>p.slot===mySlot);
}

// ── HUD ───────────────────────────────────────────────────────────
const _hud={};
function updateHUD() {
  const me=getMyPlayer(); if (!me||!gameState) return;
  const hp=Math.max(0,Math.ceil(me.hp||0));
  const wave=gameState.wave||1;
  const weapon=(me.weapon||'pistol').toUpperCase();
  const ammo=me.ammo===-1||me.ammo===Infinity?'∞':(me.ammo||0);
  const pts=me.points||0;
  const pct=Math.max(0,Math.min(100,(hp/(me.maxHp||100))*100));
  const hpCol=pct>50?'#55a049':pct>25?'#bfce72':'#883232';
  if(_hud.hp!==hp){document.getElementById('hud-hp').textContent=hp;_hud.hp=hp;}
  if(_hud.wave!==wave){document.getElementById('hud-wave').textContent=wave;_hud.wave=wave;}
  if(_hud.weapon!==weapon){document.getElementById('hud-weapon').textContent=weapon;_hud.weapon=weapon;}
  if(_hud.ammo!==ammo){document.getElementById('hud-ammo').textContent=ammo;_hud.ammo=ammo;}
  if(_hud.pts!==pts){document.getElementById('hud-pts').textContent=pts;_hud.pts=pts;}
  if(_hud.pct!==pct){document.getElementById('hp-bar-fill').style.width=pct+'%';document.getElementById('hp-bar-fill').style.background=hpCol;_hud.pct=pct;}
  const isKnife=me.ammo===0||me.ammo==='0';
  fireBtn.classList.toggle('knife',isKnife);
  fireBtn.textContent=isKnife?'KNIFE':'FIRE';
  updateActionBtn();
}

function showBanner(text,color='#883232') {
  const el=document.getElementById('wave-banner');
  el.textContent=text; el.style.color=color; el.style.display='block';
  if(bannerTimeout)clearTimeout(bannerTimeout);
  bannerTimeout=setTimeout(()=>{el.style.display='none';},3000);
}

// ── Lobby ─────────────────────────────────────────────────────────
function createRoom() { socket.emit('create-pc-room'); }

function joinRoom() {
  const code=document.getElementById('room-input').value.trim().toUpperCase();
  if(code.length!==4){document.getElementById('join-err').textContent='ENTER 4-LETTER CODE';return;}
  socket.emit('join-room',{roomCode:code,deviceFingerprint:getFingerprint(),mode:'mobile'});
}

function isPortrait() {
  return window.innerHeight > window.innerWidth;
}

function checkOrientation() {
  const warn = document.getElementById('rotate-warn');
  if (needsRotatePrompt && isPortrait()) {
    warn.classList.add('visible');
  } else {
    warn.classList.remove('visible');
  }
}

let needsRotatePrompt = false;

function toggleReady() {
  isReady=!isReady;
  const btn=document.getElementById('btn-ready');
  btn.textContent=isReady?'CANCEL':'READY UP';
  btn.classList.toggle('ready',isReady);
  socket.emit('player-ready',{roomCode});
  // Show rotate prompt if they just readied up and are in portrait
  if (isReady) {
    needsRotatePrompt = true;
    checkOrientation();
  } else {
    needsRotatePrompt = false;
    document.getElementById('rotate-warn').classList.remove('visible');
  }
}

window.addEventListener('resize', () => { resizeCanvas(); checkOrientation(); });
window.addEventListener('orientationchange', () => { setTimeout(() => { resizeCanvas(); checkOrientation(); }, 200); });

function voteRestart() { socket.emit('restart-vote-remote',{roomCode}); }

function getFingerprint() {
  const k='zt_fp'; let fp=localStorage.getItem(k);
  if(!fp){fp=Math.random().toString(36).slice(2);localStorage.setItem(k,fp);}
  return fp;
}

function updateLobbySlots(players) {
  for(let i=1;i<=4;i++){
    const el=document.getElementById(`pslot-${i}`); if(!el)continue;
    const p=players.find(p=>p.slotNumber===i);
    el.className='pslot'+(i===mySlot?' me':'')+(p?' occupied':'');
    const rd=el.querySelector('.pslot-ready');
    rd.textContent=p&&p.ready?'READY':'—';
    rd.classList.toggle('yes',!!(p&&p.ready));
  }
}

// ── Display state ─────────────────────────────────────────────────
function getDisplayState() {
  if(!gameState)return null;
  const players=gameState.players.map(p=>{
    if(p.slot===mySlot&&localMe)return{...p,x:localMe.x,y:localMe.y,hp:localMe.hp,maxHp:localMe.maxHp,ammo:localMe.ammo,weapon:localMe.weapon,points:localMe.points,alive:localMe.alive};
    if(!p.connected)return p;
    const s=smooth['p'+p.slot]; return s?{...p,x:s.x,y:s.y}:p;
  });
  const zombies=gameState.zombies.map((z,i)=>{
    const key='z'+(z.id!==undefined?z.id:i);
    const s=smooth[key]; return s?{...z,x:s.x,y:s.y}:z;
  });
  return{...gameState,players,zombies};
}

// ── RENDER ────────────────────────────────────────────────────────
const PC_PLAYER_SIZE=28, PC_AMMO_SIZE=20, PC_BOX_SIZE=50;

  // Mystery box

,hp_r=arm.hp/arm.maxHp;const aC=rg?'#883232':fl?'#fff':'#55a049';ctx.save();ctx.strokeStyle=aC;ctx.lineWidth=5;ctx.beginPath();const mA=aA+0.4,mx=Math.cos(mA)*ext*0.6,my=Math.sin(mA)*ext*0.6;ctx.moveTo(0,0);ctx.quadraticCurveTo(mx,my,Math.cos(aA)*ext,Math.sin(aA)*ext);ctx.stroke();ctx.restore();const tX=Math.cos(aA)*ext,tY=Math.sin(aA)*ext,tsz=12+Math.floor(hp_r*6);ctx.fillStyle=rg?'#883232':fl?'#fff':'#94e089';ctx.fillRect(tX-tsz/2,tY-tsz/2,tsz,tsz);ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(tX-tsz/2+1,tY-tsz/2+1,tsz-2,tsz-2);ctx.fillStyle='#003311';ctx.fillRect(tX-20,tY+tsz/2+3,40,4);ctx.fillStyle='#55a049';ctx.fillRect(tX-20,tY+tsz/2+3,40*hp_r,4);}ctx.fillStyle=fl?'#fff':'#55a049';ctx.fillRect(-14,-14,28,28);ctx.strokeStyle='#94e089';ctx.lineWidth=2;ctx.strokeRect(-13,-13,26,26);ctx.restore();}else if(b.type==='fractal'){for(let piece of b.pieces||[]){if(!piece.alive)continue;ctx.save();ctx.translate(piece.x,piece.y);ctx.rotate(piece.rotation);const hp_r=piece.hp/piece.maxHp;ctx.fillStyle=fl?'#fff':'#574200';ctx.beginPath();for(let i=0;i<3;i++){const a=-Math.PI/2+(i*2*Math.PI/3);i===0?ctx.moveTo(Math.cos(a)*piece.radius,Math.sin(a)*piece.radius):ctx.lineTo(Math.cos(a)*piece.radius,Math.sin(a)*piece.radius);}ctx.closePath();ctx.fill();if(!fl){ctx.fillStyle='#c8a800';ctx.save();ctx.clip();for(let px=-piece.radius;px<piece.radius;px+=4)for(let py=-piece.radius;py<piece.radius;py+=4)ctx.fillRect(px,py,2,2);ctx.restore();}ctx.strokeStyle='#c8a800';ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<3;i++){const a=-Math.PI/2+(i*2*Math.PI/3);i===0?ctx.moveTo(Math.cos(a)*piece.radius,Math.sin(a)*piece.radius):ctx.lineTo(Math.cos(a)*piece.radius,Math.sin(a)*piece.radius);}ctx.closePath();ctx.stroke();const bw=piece.radius*1.4;ctx.fillStyle='#1a0a00';ctx.fillRect(-bw/2,piece.radius+4,bw,4);ctx.fillStyle='#c8a800';ctx.fillRect(-bw/2,piece.radius+4,bw*hp_r,4);ctx.restore();}}else if(b.type==='octopus'){for(let i=0;i<(b.tentacles||[]).length;i++){const t=b.tentacles[i];c -segR,s.y-segR,segR*2,segR*2);ctx.strokeStyle='#55a049';ctx.lineWidth=1;ctx.strokeRect(s.x-segR+1,s.y-segR+1,segR*2-2,segR*2-2);}if(b.segs&&b.segs[0]){const head=b.segs[0],headR=18;ctx.fillStyle=fl?'#fff':'#55a049';ctx.fillRect(head.x-headR,head.y-headR,headR*2,headR*2);ctx.strokeStyle='#94e089';ctx.lineWidth=2;ctx.strokeRect(head.x-headR+1,head.y-headR+1,headR*2-2,headR*2-2);[b.angle-0.55,b.angle+0.55].forEach(ea=>{const ex=head.x+Math.cos(ea)*headR*0.55,ey=head.y+Math.sin(ea)*headR*0.55;ctx.fillStyle='#bfce72';ctx.fillRect(ex-3,ey-3,6,6);ctx.fillStyle='#000';ctx.fillRect(ex-1,ey-1,3,3);});ctx.fillStyle='#001a00';ctx.fillRect(head.x-32,head.y-headR-14,64,6);ctx.fillStyle='#55a049';ctx.fillRect(head.x-32,head.y-headR-14,64*hp_r,6);}}ctx.fillStyle='#d14da0';ctx.font='7px "Press Start 2P",monospace';ctx.textAlign='center';ctx.textBaseline='middle';if(!b.dropping)ctx.fillText(b.label||'BOSS',b.x,b.y-(b.radius||80)-22);}

// ── Voice chat ────────────────────────────────────────────────────
let localStream=null,rtcPeers={},audioCtx=null,analyserNodes={},speakingState={};

async function initVoiceChat(){
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    document.getElementById('mic-btn').classList.add('active');
    document.getElementById('mic-label').textContent='MIC ON';
    setupVoiceAnalyser(mySlot,localStream);
  }catch(e){
    document.getElementById('mic-btn').classList.add('denied');
    document.getElementById('mic-label').textContent='NO MIC';
  }
}

function toggleMute(){
  myMuted=!myMuted;
  if(localStream)localStream.getAudioTracks().forEach(t=>t.enabled=!myMuted);
  const btn=document.getElementById('mic-btn');
  const label=document.getElementById('mic-label');
  if(myMuted){btn.className='denied';label.textContent='MUTED';}
  else{btn.className='active';label.textContent='MIC ON';}
}

setInterval(()=>{
  if(!audioCtx||!analyserNodes[mySlot])return;
  const data=new Uint8Array(32);
  analyserNodes[mySlot].getByteFrequencyData(data);
  const vol=data.reduce((s,v)=>s+v,0)/data.length;
  const speaking=vol>12&&!myMuted;
  const btn=document.getElementById('mic-btn');
  if(speaking)btn.classList.add('speaking');else btn.classList.remove('speaking');
},80);

function getOrCreatePeer(rs){
  if(rtcPeers[rs])return rtcPeers[rs];
  const pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]});
  if(localStream)localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.onicecandidate=e=>{if(e.candidate)socket.emit('rtc-ice',{roomCode,to:rs,from:mySlot,candidate:e.candidate});};
  pc.ontrack=e=>{const a=new Audio();a.srcObject=e.streams[0];a.play().catch(()=>{});setupVoiceAnalyser(rs,e.streams[0]);};
  rtcPeers[rs]=pc; return pc;
}
async function initiateCall(rs){const pc=getOrCreatePeer(rs);const offer=await pc.createOffer();await pc.setLocalDescription(offer);socket.emit('rtc-offer',{roomCode,to:rs,from:mySlot,offer});}
function setupVoiceAnalyser(slot,stream){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const src=audioCtx.createMediaStreamSource(stream);const an=audioCtx.createAnalyser();an.fftSize=512;src.connect(an);analyserNodes[slot]=an;}catch(e){}}

// ── Socket ────────────────────────────────────────────────────────
socket=io({transports:['websocket']});

socket.on('connect',()=>{
  const urlRoom=new URLSearchParams(window.location.search).get('room');
  if(urlRoom){document.getElementById('room-input').value=urlRoom.toUpperCase();joinRoom();}
});
socket.on('room-created',d=>{
  roomCode=d.roomCode;
  socket.emit('join-room',{roomCode,deviceFingerprint:getFingerprint(),mode:'mobile'});
});
socket.on('join-success',d=>{
  roomCode=d.roomCode;mySlot=d.slotNumber;myColor=PLAYER_COLORS[mySlot-1];
  document.getElementById('lobby-screen').style.display='none';
  document.getElementById('waiting-screen').style.display='flex';
  document.getElementById('room-code-disp').textContent=roomCode;
  document.getElementById(`pslot-${mySlot}`).classList.add('me');
  initVoiceChat();
});
socket.on('join-failed',d=>{document.getElementById('join-err').textContent=d.reason||'JOIN FAILED';});
socket.on('lobby-update',d=>updateLobbySlots(d.players));
socket.on('ready-countdown',d=>{const el=document.getElementById('countdown-disp');el.style.display='block';el.textContent=d.seconds;});
socket.on('ready-countdown-cancelled',()=>{document.getElementById('countdown-disp').style.display='none';});
socket.on('game-starting-remote',()=>{
  needsRotatePrompt = false;
  document.getElementById('rotate-warn').classList.remove('visible');
  document.getElementById('waiting-screen').style.display='none';
  document.getElementById('lobby-screen').style.display='none';
  document.getElementById('game-wrap').style.display='block';
  document.getElementById('controls-overlay').style.display='block';
  document.body.classList.add('game-active');
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(()=>{});
  }
  resizeCanvas();
  startInputLoop();
});
socket.on('remote-game-state',state=>{
  gameState=state;

  // Convert server explosions → melee flash animations
  if (state.explosions && state.explosions.length > 0) {
    for (const ex of state.explosions) {
      if (ex.melee) {
        meleeFlashes.push({ x:ex.x, y:ex.y, angle:ex.angle||0, color:ex.color, timer:8 });
      }
    }
  }
  const me=state.players.find(p=>p.slot===mySlot);
  if(me){
    if(!localMe){localMe={...me};}
    else{
      const dx=me.x-localMe.x,dy=me.y-localMe.y;
      if(Math.sqrt(dx*dx+dy*dy)>160){localMe.x=me.x;localMe.y=me.y;}
      localMe.hp=me.hp;localMe.maxHp=me.maxHp;
      localMe.ammo=me.ammo===(-1)?Infinity:me.ammo;
      localMe.weapon=me.weapon;localMe.points=me.points;localMe.alive=me.alive;
      localMe.canUseMysteryBox=me.canUseMysteryBox;localMe.canUseVending=me.canUseVending;
      localMe.vendingCost=me.vendingCost;
    }
  }
  for(const p of state.players){if(p.slot===mySlot||!p.connected)continue;getSmoothPos('p'+p.slot,p.x,p.y,p.vx||0,p.vy||0);}
  for(let i=0;i<state.zombies.length;i++){const z=state.zombies[i];const key='z'+(z.id!==undefined?z.id:i);getSmoothPos(key,z.x,z.y,z.vx||0,z.vy||0);}
  if(state.gameOver&&document.getElementById('gameover-screen').style.display==='none'){document.getElementById('gameover-screen').style.display='flex';}
});
socket.on('wave-start',d=>showBanner(d.type==='boss'?`⚠ BOSS WAVE ${d.wave}`:`WAVE ${d.wave}`,d.type==='boss'?'#ff6600':'#883232'));
socket.on('restart-vote-update',d=>{document.getElementById('vote-disp').textContent=`VOTES: ${d.votes}/${d.needed}`;});
socket.on('game-restarting-remote',()=>{document.getElementById('gameover-screen').style.display='none';gameState=null;localMe=null;meleeFlashes=[];for(const k of Object.keys(smooth))delete smooth[k];});
socket.on('rtc-initiate',async d=>{if(d.offerer===mySlot)await initiateCall(d.answerer);});
socket.on('rtc-offer',async d=>{const pc=getOrCreatePeer(d.from);await pc.setRemoteDescription(d.offer);const ans=await pc.createAnswer();await pc.setLocalDescription(ans);socket.emit('rtc-answer',{roomCode,to:d.from,from:mySlot,answer:ans});});
socket.on('rtc-answer',async d=>{const pc=rtcPeers[d.from];if(pc)await pc.setRemoteDescription(d.answer);});
socket.on('rtc-ice',async d=>{const pc=rtcPeers[d.from];if(pc)try{await pc.addIceCandidate(d.candidate);}catch(e){}});

// ── Render loop ───────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  if(document.getElementById('game-wrap').style.display!=='none')renderGame();
}
requestAnimationFrame(loop);
</script>
