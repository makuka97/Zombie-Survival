<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z-TEAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000000;
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
      gap: 0;
    }

    /* Scanlines */
    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.25) 2px, rgba(0,0,0,0.25) 4px
      );
      pointer-events: none; z-index: 100;
    }

    #screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      width: 100%; max-width: 860px;
      padding: 0 20px;
    }

    /* ── Attribution above title ── */
    #attribution {
      color: #8b3f96;
      font-size: clamp(8px, 1.4vw, 11px);
      letter-spacing: 4px;
      margin-bottom: 18px;
      text-align: center;
    }

    /* ── Big pixel title ── */
    #title-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    #title {
      font-size: clamp(72px, 16vw, 130px);
      color: #883232;
      letter-spacing: clamp(8px, 2vw, 20px);
      line-height: 1;
      text-align: center;
      /* C64 chunky pixel feel — slight roughness via text-shadow offset */
      text-shadow:
        3px 3px 0 #3d0000,
        -1px -1px 0 #5a1a1a,
        2px 0 0 #3d0000;
    }

    /* ── Subtitle under title ── */
    #subtitle {
      color: #8b3f96;
      font-size: clamp(8px, 1.4vw, 11px);
      letter-spacing: 6px;
      text-align: center;
      margin-bottom: 48px;
    }

    /* ── Author line ── */
    #author {
      color: #7869c4;
      font-size: clamp(7px, 1.2vw, 9px);
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 52px;
    }

    /* ── Menu buttons ── */
    #menu { display: flex; flex-direction: row; gap: 28px; margin-bottom: 40px; }

    .menu-btn {
      width: clamp(200px, 28vw, 280px);
      height: 52px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(8px, 1.5vw, 11px);
      letter-spacing: 2px;
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 7px;
      text-decoration: none;
      border: 2px solid;
      background: transparent;
      transition: background 0.08s, color 0.08s;
    }
    .menu-btn .btn-sub {
      font-size: clamp(5px, 0.8vw, 7px);
      letter-spacing: 1px; opacity: 0.55;
    }

    #local-btn  { color: #ffffff; border-color: #ffffff; }
    #local-btn:hover  { background: #883232; border-color: #883232; }

    #pc-btn     { color: #7869c4; border-color: #7869c4; }
    #pc-btn:hover     { background: rgba(120,105,196,0.2); color: #ffffff; border-color: #ffffff; }

    #remote-btn { color: #222244; border-color: #222244; cursor: not-allowed; pointer-events: none; }

    .badge { font-size: 5px; background: #883232; color: #fff; padding: 2px 5px; letter-spacing: 1px; margin-left: 6px; vertical-align: middle; }

    /* ── Patch notes ── */
    #patch-notes {
      border: 1px solid #40318d;
      padding: 12px 16px;
      background: transparent;
      width: clamp(260px, 46vw, 520px);
    }
    #patch-notes h3 {
      font-size: 7px; letter-spacing: 3px; color: #40318d;
      margin-bottom: 8px; padding-bottom: 7px;
      border-bottom: 1px solid #40318d;
    }
    #patch-notes ul { list-style: none; display: flex; flex-wrap: wrap; gap: 4px 24px; }
    #patch-notes ul li {
      font-size: 6px; letter-spacing: 1px; color: #40318d;
      padding-left: 10px; position: relative; line-height: 1.8;
    }
    #patch-notes ul li::before { content: '›'; position: absolute; left: 0; color: #7869c4; }

    /* ── Version ── */
    #version {
      position: fixed; bottom: 10px; right: 14px;
      font-size: 6px; color: #1a1a3a; letter-spacing: 2px; z-index: 1;
    }

    /* Blinking insert-coin text */
    #insert-coin {
      color: #7869c4;
      font-size: clamp(7px, 1.2vw, 9px);
      letter-spacing: 4px;
      margin-top: 6px;
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>

<div id="screen">
  <div id="title-wrap">
    <div id="title">Z-TEAM</div>
  </div>

  <div id="author">WRITTEN BY MICAJAH NORDYKE</div>

  <div id="menu">
    <a id="local-btn" class="menu-btn" href="/index.html">
      LOCAL PARTY
    </a>
    <a id="pc-btn" class="menu-btn" href="/pc.html">
      PC MULTIPLAYER
    </a>
  </div>

  <div id="patch-notes">
    <h3>PATCH NOTES · V2.2</h3>
    <ul>
      <li>C64 visual overhaul</li>
      <li>Pixel stab replaces arc flash</li>
      <li>PC mode client prediction</li>
      <li>Zombie death glitch fixed</li>
      <li>8 unique bosses every 5 waves</li>
      <li>20hz PC broadcast rate</li>
    </ul>
  </div>

  <div id="insert-coin">— SELECT MODE —</div>
</div>

<div id="version">PHASE 2B · BUILD 2.2</div>

</body>
</html>
